<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Вход — ToiLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/tokens.css"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }

    :root {
      --pink:      var(--color-accent);
      --orange:    var(--color-accent-2);
      --pink-glow: var(--color-accent-glow);
      --pink-soft: var(--color-accent-soft);
      --text:      var(--color-text);
      --text-2:    var(--color-text-secondary);
      --border:    var(--color-border-strong);
      --surface:   var(--color-bg);
      --white:     #ffffff;
      --sans:      var(--font-sans);
      --serif:     var(--font-serif);
      --ease:      var(--ease-in-out);
    }

    /* ─── Layout ─── */
    body {
      font-family: var(--sans);
      background: var(--white);
      display: flex;
      min-height: 100dvh;
    }

    /* ─── LEFT PANEL (desktop branding) ─── */
    .brand {
      display: none;
    }

    /* ─── RIGHT PANEL (form) ─── */
    .form-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: var(--white);
      position: relative;
      background-image:
        radial-gradient(ellipse 70% 50% at 90% 5%,  rgba(249,59,122,0.05) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 10% 90%, rgba(249,59,122,0.04) 0%, transparent 60%);
    }

    .form-card {
      width: 100%;
      max-width: 380px;
    }

    /* Mobile logo (hidden on desktop) */
    .mobile-logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .mobile-logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--pink) 0%, var(--orange) 100%);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 6px 20px var(--pink-glow);
    }
    .mobile-logo-title {
      font-family: var(--serif);
      font-size: 2rem; font-weight: 600; font-style: italic;
      color: var(--text); line-height: 1;
    }

    /* Form heading */
    .form-heading {
      margin-bottom: 28px;
    }
    .form-heading h1 {
      font-family: var(--serif);
      font-size: 1.875rem; font-weight: 600; font-style: italic;
      color: var(--text); line-height: 1.15; margin-bottom: 6px;
    }
    .form-heading p {
      font-size: 0.9375rem; color: var(--text-2); line-height: 1.5;
    }

    /* Fields */
    .fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 20px; }

    .field { position: relative; }

    .field-inp {
      width: 100%; height: 3.25rem;
      padding: 1rem 1rem 0.375rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 1rem;
      font-family: var(--sans); font-size: 1rem; font-weight: 500;
      color: var(--text); outline: none;
      transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease), background 200ms var(--ease);
    }
    .field-inp::placeholder { color: transparent; }
    .field-inp:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(249,59,122,0.10);
      background: var(--white);
    }
    .field-lbl {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      font-size: 1rem; color: var(--text-2); pointer-events: none;
      transition: all 200ms var(--ease);
    }
    .field-inp:focus ~ .field-lbl,
    .field-inp:not(:placeholder-shown) ~ .field-lbl {
      top: 0.65rem; transform: none;
      font-size: 0.6875rem; font-weight: 600; letter-spacing: 0.04em;
      color: var(--pink); text-transform: uppercase;
    }

    /* Error */
    .field-err {
      font-size: 0.8125rem; color: #EF4444;
      margin-top: -8px; margin-left: 4px;
      display: none;
    }

    /* Submit button */
    .btn-submit {
      width: 100%; height: 3.375rem;
      background: linear-gradient(135deg, var(--pink) 0%, var(--orange) 100%);
      color: #fff; border: none; border-radius: 999px;
      font-family: var(--sans); font-size: 1rem; font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 24px var(--pink-glow);
      transition: box-shadow 200ms var(--ease), transform 150ms var(--ease);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover  { box-shadow: 0 10px 32px rgba(249,59,122,0.42); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); box-shadow: 0 4px 14px rgba(249,59,122,0.25); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .form-hint {
      text-align: center;
      font-size: 0.8125rem; color: var(--text-2);
      margin-top: 16px; line-height: 1.5;
    }

    /* ─── DESKTOP ─── */
    @media (min-width: 800px) {
      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 46%;
        flex-shrink: 0;
        padding: 56px 48px;
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(ellipse 80% 60% at 20% 20%, rgba(249,59,122,0.25) 0%, transparent 55%),
          radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,109,69,0.20) 0%, transparent 50%),
          linear-gradient(160deg, #0f0f0f 0%, #1a0810 40%, #2d0e20 100%);
        color: #fff;
      }

      /* Decorative circles */
      .brand::before, .brand::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,0.07);
        pointer-events: none;
      }
      .brand::before { width: 480px; height: 480px; top: -120px; right: -160px; }
      .brand::after  { width: 320px; height: 320px; bottom: -80px; left: -100px; }

      .brand-logo {
        font-family: var(--serif);
        font-size: 3rem; font-weight: 600; font-style: italic;
        color: #fff; margin-bottom: 10px; position: relative; z-index: 1;
      }
      .brand-tagline {
        font-size: 1rem; color: rgba(255,255,255,0.55);
        text-align: center; line-height: 1.65; max-width: 280px;
        position: relative; z-index: 1; margin-bottom: 48px;
      }

      /* Floating invitation card mockup */
      .brand-card {
        position: relative; z-index: 1;
        width: 180px;
        aspect-ratio: 9/16;
        border-radius: 18px;
        background: linear-gradient(170deg, #1a2e22 0%, #0e1c15 100%);
        color: #e8eed0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 20px 16px;
        box-shadow:
          0 32px 64px rgba(0,0,0,0.5),
          0 0 0 1px rgba(255,255,255,0.06);
        transform: rotate(-3deg);
        animation: float 5s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: rotate(-3deg) translateY(0); }
        50%       { transform: rotate(-3deg) translateY(-10px); }
      }
      .brand-card-badge {
        font-size: 0.42rem; letter-spacing: 0.3em; text-transform: uppercase;
        opacity: 0.5; font-weight: 600; margin-bottom: 10px;
      }
      .brand-card-ornament {
        font-size: 0.5rem; letter-spacing: 0.25em; opacity: 0.4; margin-bottom: 6px;
      }
      .brand-card-names {
        font-family: var(--serif);
        font-size: 1.1rem; font-weight: 600; font-style: italic;
        line-height: 1.15; text-align: center; margin-bottom: 8px;
      }
      .brand-card-line {
        width: 24px; height: 1px; background: currentColor; opacity: 0.25; margin: 0 auto 8px;
      }
      .brand-card-date {
        font-size: 0.42rem; letter-spacing: 0.2em; opacity: 0.5; font-style: italic;
      }

      .mobile-logo { display: none; }

      .form-side {
        flex: 1;
        background: var(--white);
        background-image: none;
      }

      .form-card {
        max-width: 400px;
      }

      .form-heading h1 { font-size: 2.25rem; }
    }
  </style>
</head>
<body>

<!-- LEFT: branding (desktop only) -->
<div class="brand" aria-hidden="true">
  <p class="brand-logo">ToiLink</p>
  <p class="brand-tagline">Красивые цифровые приглашения на свадьбу, той и особые события</p>
  <div class="brand-card">
    <div class="brand-card-badge">Wedding Invitation</div>
    <div class="brand-card-ornament">— ✦ —</div>
    <div class="brand-card-names">Айдана<br/>&amp; Бакыт</div>
    <div class="brand-card-line"></div>
    <div class="brand-card-date">15 · VI · 2025 &nbsp;·&nbsp; Бишкек</div>
  </div>
</div>

<!-- RIGHT: form -->
<div class="form-side">
  <div class="form-card">

    <!-- Mobile only logo -->
    <div class="mobile-logo">
      <div class="mobile-logo-icon">
        <svg width="30" height="30" fill="none" stroke="#fff" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <p class="mobile-logo-title">ToiLink</p>
    </div>

    <div class="form-heading">
      <h1>С возвращением</h1>
      <p>Войдите, чтобы открыть свои приглашения</p>
    </div>

    <div class="fields">
      <div class="field">
        <input id="phone" class="field-inp" type="tel" inputmode="tel" autocomplete="tel" placeholder="Номер телефона"/>
        <label for="phone" class="field-lbl">Номер телефона</label>
      </div>
      <div class="field">
        <input id="password" class="field-inp" type="password" autocomplete="current-password" placeholder="Пароль"/>
        <label for="password" class="field-lbl">Пароль</label>
      </div>
      <p id="error" class="field-err"></p>
    </div>

    <button type="button" id="btn" class="btn-submit">Войти</button>

    <p class="form-hint">
      Нет аккаунта? Создайте приглашение —<br/>аккаунт появится автоматически.
    </p>
  </div>
</div>

<script>
  fetch('/api/auth/me', { credentials: 'include' })
    .then(r => r.ok ? r.json() : null)
    .then(data => { if (data?.phone) location.replace('/'); })
    .catch(() => {});

  const phoneEl = document.getElementById('phone');
  const passEl  = document.getElementById('password');
  const errEl   = document.getElementById('error');
  const btn     = document.getElementById('btn');

  async function submit() {
    errEl.style.display = 'none';
    const rawPhone = phoneEl.value.replace(/\D/g, '');
    if (rawPhone.length < 7) {
      errEl.textContent = 'Введите корректный номер телефона';
      errEl.style.display = 'block'; return;
    }
    if (passEl.value.length < 4) {
      errEl.textContent = 'Пароль минимум 4 символа';
      errEl.style.display = 'block'; return;
    }
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: '+' + rawPhone, password: passEl.value }),
        credentials: 'include',
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        errEl.textContent = data.message || 'Неверный номер или пароль';
        errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Войти'; return;
      }
      localStorage.setItem('tl_phone', '+' + rawPhone);
      const params = new URLSearchParams(location.search);
      location.replace(params.get('next') || '/');
    } catch {
      errEl.textContent = 'Ошибка соединения';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Войти';
    }
  }

  btn.addEventListener('click', submit);
  phoneEl.addEventListener('keydown', e => { if (e.key === 'Enter') passEl.focus(); });
  passEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
</script>
</body>
</html>
