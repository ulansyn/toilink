<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Свадебное приглашение</title>
    <meta name="description" content="Приглашение на свадьбу">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&display=swap"
        rel="stylesheet">



    <link rel="stylesheet" href="css/envelope.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body class="loading-active">


    <div id="ivento-preloader" class="ivento-preloader">
        <div class="preloader-content">
            <div class="preloader-logo">
                <span class="preloader-initials" data-content="couple.name1.charAt(0)">U</span>
                <span class="preloader-amp">&</span>
                <span class="preloader-initials" data-content="couple.name2.charAt(0)">E</span>
            </div>
            <div class="preloader-bar-wrap">
                <div class="preloader-bar"></div>
            </div>
            <p class="preloader-text">Загрузка прекрасного...</p>
        </div>
    </div>

    <main class="hero" data-section="hero">

        <canvas id="hero-particles" class="hero-particles"></canvas>

        <div class="hero-background">
            <img src="" alt="Background" class="hero-img" data-img="heroBackground">
            <div class="overlay"></div>
            <div class="overlay-vignette"></div>
            <div class="overlay-grain"></div>
        </div>


        <div class="hero-frame">
            <span class="hero-frame-corner hero-frame-tl"></span>
            <span class="hero-frame-corner hero-frame-tr"></span>
            <span class="hero-frame-corner hero-frame-bl"></span>
            <span class="hero-frame-corner hero-frame-br"></span>
        </div>

        <div class="hero-content">

            <p class="hero-label">Мы женимся</p>

            <div class="names-container fade-in">
                <h1 class="name name--first" data-content="couple.name1"></h1>
                <div class="hero-ampersand-wrap">
                    <span class="hero-ampersand-line hero-ampersand-line--left"></span>
                    <span class="hero-ampersand">&amp;</span>
                    <span class="hero-ampersand-line hero-ampersand-line--right"></span>
                </div>
                <h1 class="name name--second" data-content="couple.name2"></h1>
            </div>

            <div class="date-container fade-in-delayed">
                <div class="hero-date-ornament">
                    <span class="hero-date-line"></span>
                    <p class="date" data-content="couple.dateDisplay"></p>
                    <span class="hero-date-line"></span>
                </div>
            </div>


            <div class="hero-countdown" id="hero-countdown">
                <div class="hero-countdown-item">
                    <span class="hero-countdown-number" id="countdown-days">0</span>
                    <span class="hero-countdown-label">дней</span>
                </div>
                <div class="hero-countdown-sep">:</div>
                <div class="hero-countdown-item">
                    <span class="hero-countdown-number" id="countdown-hours">0</span>
                    <span class="hero-countdown-label">часов</span>
                </div>
                <div class="hero-countdown-sep">:</div>
                <div class="hero-countdown-item">
                    <span class="hero-countdown-number" id="countdown-minutes">0</span>
                    <span class="hero-countdown-label">минут</span>
                </div>
                <div class="hero-countdown-sep">:</div>
                <div class="hero-countdown-item">
                    <span class="hero-countdown-number" id="countdown-seconds">00</span>
                    <span class="hero-countdown-label">секунд</span>
                </div>
            </div>
        </div>


        <div class="hero-scroll-down">
            <span class="hero-scroll-text">Листать вниз</span>
            <div class="hero-scroll-arrow">
                <svg width="20" height="30" viewBox="0 0 20 30" fill="none">
                    <rect x="8" y="0" width="4" height="18" rx="2" fill="rgba(255,255,255,0.5)" />
                    <path d="M2 20 L10 28 L18 20" stroke="rgba(255,255,255,0.7)" stroke-width="2" fill="none"
                        stroke-linecap="round" />
                </svg>
            </div>
        </div>
    </main>


    <section class="invitation-text" data-section="invitation">
        <div class="invitation-inner">
            <h2 class="invitation-heading" data-content="invitation.heading"></h2>

            <div data-render="invitation.paragraphs"></div>
            <p class="invitation-signature" data-content="couple.signatureText"></p>
        </div>
    </section>


    <div class="section-ornament">
        <span class="ornament-line"></span>
        <span class="ornament-diamond">◇</span>
        <span class="ornament-line"></span>
    </div>


    <section class="calendar-section" data-section="calendar">
        <div class="calendar-inner">
            <h2 class="calendar-heading" data-content="calendar.heading">August</h2>
            <div id="calendar-grid" class="calendar-grid"></div>
        </div>
    </section>


    <section class="photo-stack" data-section="photoStack">

    </section>


    <div class="section-ornament">
        <span class="ornament-line"></span>
        <span class="ornament-diamond">◇</span>
        <span class="ornament-line"></span>
    </div>


    <section class="location-section" data-section="location">
        <div class="location-inner">
            <h2 class="location-heading" data-content="location.heading"></h2>
            <div class="location-photo">
                <img src="" alt="Location" data-img="locationPhoto">
            </div>
            <p class="location-address" data-content="location.address"></p>
            <a href="#" class="location-button" target="_blank" data-link="location.mapLink"
                data-content="location.buttonText"></a>
        </div>
    </section>


    <section class="timeline-section" data-section="timeline">
        <div class="timeline-inner">
            <h2 class="timeline-heading" data-content="timeline.heading"></h2>

            <div class="timeline-track" data-render="timeline.events"></div>
        </div>
    </section>


    <div class="section-wave section-wave--to-dark">
        <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,40 C360,80 720,0 1080,40 C1260,60 1380,50 1440,40 L1440,80 L0,80 Z"
                fill="var(--primary-green)" />
        </svg>
    </div>


    <section class="dresscode-section" data-section="dresscode">
        <div class="dresscode-inner">
            <h2 class="dresscode-heading" data-content="dresscode.heading"></h2>
            <p class="dresscode-text" data-content="dresscode.text"></p>

            <div class="dresscode-palette" data-render="dresscode.colors"></div>
        </div>
    </section>


    <section class="rsvp-section" data-section="rsvp">
        <div class="rsvp-inner">

            <div class="rsvp-card-container" data-render="rsvp"></div>
        </div>
    </section>


    <div style="background: var(--bg-light, #F9F6F0); color: var(--text-main, #2C352D);">
        <footer class="ivento-footer">
            <div class="ivento-footer-divider"></div>
            <div class="ivento-footer-brand">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linejoin="round" />
                </svg>
                <span>Ivento</span>
            </div>
            <div class="ivento-footer-social">
                <a href="https://instagram.com/ivento_kg" target="_blank" class="ivento-social-link"
                    aria-label="Instagram">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.266.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.947.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                    </svg>
                </a>
                <a href="https://wa.me/77000000000" target="_blank" class="ivento-social-link" aria-label="WhatsApp">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                        <path
                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
                    </svg>
                </a>
            </div>
            <div class="ivento-footer-legal">
                <p>Сделано с любовью командой Ivento</p>
                <p>© 2026. Все права защищены.</p>
            </div>
        </footer>
    </div>



    <!-- ========== JAVASCRIPT ========== -->
    <!-- Порядок важен! Сначала конфиг, потом envelope, потом рендерер и анимации -->
    <script src="js/config.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/security.js"></script>
    <script src="js/hero.js"></script>
    <script src="js/envelope.js"></script>
    <script src="js/music.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/guest-loader.js"></script>
    <script src="js/animations.js"></script>
</body>

</html>
