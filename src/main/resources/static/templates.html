<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>ToiLink — Выбор шаблона</title>

  <script>
    (function () {
      try { if (!localStorage.getItem('tl_phone')) location.replace('/landing.html'); } catch (_) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,500&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { inter: ['Inter','sans-serif'], cormorant: ['Cormorant Garamond','serif'], playfair: ['Playfair Display','serif'] },
          colors: {
            ink: '#1E2820', muted: '#6B6860',
            cream: '#FAFAF8', cream2: '#F5F2EE', cream3: '#F0EDE8',
            line: '#E8E4DE', sage: '#3D6B45', sage2: '#2C4A30',
            mint: '#C2E0C6', gold: '#C2A882'
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #FAFAF8; color: #1E2820; overscroll-behavior-y: none; }
    .font-cormorant { font-family: 'Cormorant Garamond', serif; }
    .font-playfair { font-family: 'Playfair Display', serif; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -400px 0 } 100% { background-position: 400px 0 } }
    @keyframes shine {
      0% { transform: translateX(-120%) skewX(-20deg) }
      100% { transform: translateX(260%) skewX(-20deg) }
    }
    .reveal { opacity: 0; transform: translateY(18px); transition: opacity .55s cubic-bezier(.22,1,.36,1), transform .55s cubic-bezier(.22,1,.36,1); }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .fade-in { opacity: 0; transform: translateY(14px); transition: opacity .5s cubic-bezier(.22,1,.36,1), transform .5s cubic-bezier(.22,1,.36,1); }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* Buttons */
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: #1E2820; color: #fff;
      padding: 14px 24px; border-radius: 100px;
      font-size: 14px; font-weight: 600;
      box-shadow: 0 6px 20px rgba(30,40,32,.22), 0 1px 3px rgba(0,0,0,.08);
      transition: transform .15s ease, background .2s;
      text-decoration: none; cursor: pointer; border: none;
      position: relative; overflow: hidden;
    }
    .btn-primary::after {
      content: ''; position: absolute; top: 0; left: 0;
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
      transform: translateX(-120%) skewX(-20deg);
    }
    .btn-primary:hover::after { animation: shine 1.1s ease; }
    .btn-primary:hover { background: #3D6B45; }
    .btn-primary:active { transform: scale(.96); }
    .btn-primary.size-sm { padding: 10px 18px; font-size: 13px; }

    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; color: #1E2820;
      padding: 13px 22px; border-radius: 100px;
      font-size: 14px; font-weight: 500;
      border: 1.5px solid #D8D4CE;
      transition: transform .15s ease, border-color .2s, background .2s;
      cursor: pointer; text-decoration: none;
    }
    .btn-secondary:hover { border-color: #1E2820; background: rgba(30,40,32,.03); }
    .btn-secondary:active { transform: scale(.96); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      color: #1E2820; font-weight: 500; font-size: 14px;
      padding: 9px 14px; border-radius: 100px;
      transition: background .2s; cursor: pointer;
    }
    .btn-ghost:hover { background: rgba(30,40,32,.06); }

    /* Top nav */
    .top-nav {
      background: rgba(250,250,248,.78);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(232,228,222,.6);
    }
    .nav-link {
      position: relative; padding: 8px 4px;
      font-size: 14px; font-weight: 500; color: #6B6860;
      transition: color .2s; cursor: pointer; text-decoration: none;
    }
    .nav-link.active { color: #1E2820; }
    .nav-link:hover { color: #3D6B45; }
    .nav-link.active::before {
      content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
      height: 2px; background: #3D6B45; border-radius: 2px;
    }

    /* Mobile header */
    .mobile-header {
      position: sticky; top: 0; z-index: 30;
      background: rgba(250,250,248,.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(232,228,222,.6);
      padding-top: env(safe-area-inset-top, 0px);
    }

    /* Hero */
    .hero-soft {
      background: radial-gradient(60% 40% at 80% 0%, rgba(61,107,69,.08) 0%, transparent 70%),
                  radial-gradient(50% 35% at 0% 0%, rgba(194,168,130,.10) 0%, transparent 70%);
    }
    .section-divider { width: 36px; height: 2px; background: #C2E0C6; border-radius: 2px; }

    /* Category filter chips */
    .cat-scroll { overflow-x: auto; scroll-snap-type: x proximity; padding-bottom: 4px; }
    .cat-chip {
      flex-shrink: 0;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 18px; border-radius: 100px;
      font-size: 13px; font-weight: 500;
      background: #fff; color: #6B6860;
      border: 1.5px solid #E8E4DE;
      cursor: pointer;
      transition: all .2s;
      scroll-snap-align: start;
      white-space: nowrap;
    }
    .cat-chip:hover { border-color: #1E2820; color: #1E2820; }
    .cat-chip.active {
      background: #1E2820; color: #fff; border-color: #1E2820;
      box-shadow: 0 6px 16px rgba(30,40,32,.18);
    }
    .cat-chip .count {
      font-size: 11px; padding: 2px 7px; border-radius: 100px;
      background: rgba(30,40,32,.08); color: inherit; font-weight: 600;
    }
    .cat-chip.active .count { background: rgba(255,255,255,.18); color: #fff; }

    /* Template card */
    .tpl-card {
      position: relative;
      background: #fff; border-radius: 22px;
      overflow: hidden;
      border: 1px solid #F0EDE8;
      box-shadow: 0 4px 18px rgba(30,40,32,.05);
      cursor: pointer;
      transition: transform .3s cubic-bezier(.22,1,.36,1), box-shadow .3s ease, border-color .2s;
      display: flex; flex-direction: column;
    }
    .tpl-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 48px rgba(30,40,32,.14);
      border-color: #DDD8CE;
    }
    .tpl-card:active { transform: scale(.98); }
    .tpl-preview {
      position: relative; aspect-ratio: 3/4;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 28px 20px; text-align: center;
      overflow: hidden;
    }
    .tpl-preview::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,.25) 100%);
      z-index: 1;
    }
    .tpl-preview > * { position: relative; z-index: 2; }

    /* Preview themes — designed to evoke real invitation styles */
    .tpl-wedding {
      background:
        radial-gradient(60% 40% at 50% 20%, rgba(194,224,198,.18) 0%, transparent 70%),
        linear-gradient(160deg, #2C4A30 0%, #1E2820 100%);
      color: #F5F2EE;
    }
    .tpl-wedding .ornament { color: #C2E0C6; }

    .tpl-minimal {
      background: linear-gradient(160deg, #FAFAF8 0%, #F0EDE8 100%);
      color: #1E2820;
    }
    .tpl-minimal .ornament { color: #C2A882; }

    .tpl-luxury {
      background:
        radial-gradient(60% 40% at 50% 25%, rgba(212,175,122,.20) 0%, transparent 70%),
        linear-gradient(160deg, #2B1B4E 0%, #1A0A2E 100%);
      color: #E9D5A8;
    }
    .tpl-luxury .ornament { color: #D4AF7A; }

    .tpl-birthday {
      background: linear-gradient(160deg, #FDF6F0 0%, #F5DFD0 100%);
      color: #8B4A3C;
    }
    .tpl-birthday .ornament { color: #C88A6E; }

    .tpl-floral {
      background:
        radial-gradient(60% 40% at 50% 25%, rgba(194,224,198,.28) 0%, transparent 70%),
        linear-gradient(160deg, #F0F5F1 0%, #D8E4DA 100%);
      color: #2C4A30;
    }
    .tpl-floral .ornament { color: #4A7C59; }

    .tpl-toi {
      background: linear-gradient(160deg, #8B3330 0%, #5C1F1F 100%);
      color: #F5D8A8;
    }
    .tpl-toi .ornament { color: #F5D8A8; }

    .tpl-baby {
      background: linear-gradient(160deg, #F8EEE4 0%, #EAD8C8 100%);
      color: #7C5520;
    }
    .tpl-baby .ornament { color: #B8946E; }

    .tpl-modern {
      background: linear-gradient(160deg, #1E2820 0%, #2C3A2F 100%);
      color: #FAFAF8;
    }
    .tpl-modern .ornament { color: #C2A882; }

    .tpl-ornament-top, .tpl-ornament-bottom {
      font-size: 14px; letter-spacing: .4em;
      opacity: .7;
    }
    .tpl-preview .names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 500; font-style: italic;
      line-height: 1.15;
      margin: 12px 0 6px;
    }
    .tpl-preview .sub {
      font-size: 9px; letter-spacing: .3em; text-transform: uppercase;
      opacity: .75; font-weight: 500;
    }
    .tpl-preview .date {
      font-family: 'Playfair Display', serif;
      font-size: 13px; font-style: italic;
      margin-top: 10px; opacity: .9;
    }

    .tpl-badge {
      position: absolute; top: 12px; left: 12px;
      z-index: 3;
      font-size: 10px; font-weight: 600;
      padding: 4px 10px; border-radius: 100px;
      background: rgba(255,255,255,.92); color: #1E2820;
      backdrop-filter: blur(8px);
      letter-spacing: .1em;
    }
    .tpl-badge.dark { background: rgba(30,40,32,.85); color: #fff; }

    .tpl-premium-tag {
      position: absolute; top: 12px; right: 12px;
      z-index: 3;
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600;
      padding: 4px 10px; border-radius: 100px;
      background: linear-gradient(135deg, #C2A882, #A68762);
      color: #fff;
      box-shadow: 0 4px 12px rgba(194,168,130,.35);
    }

    .tpl-info {
      padding: 16px 18px 18px;
      border-top: 1px solid #F0EDE8;
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
    }
    .tpl-info .meta { min-width: 0; }
    .tpl-info .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 600; font-style: italic;
      color: #1E2820; line-height: 1.2;
    }
    .tpl-info .cat {
      font-size: 11px; color: #6B6860;
      margin-top: 2px;
    }
    .tpl-cta {
      width: 34px; height: 34px; border-radius: 100px;
      background: #F5F2EE; color: #1E2820;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, transform .15s, color .2s;
      flex-shrink: 0;
    }
    .tpl-card:hover .tpl-cta { background: #1E2820; color: #fff; transform: translateX(2px); }

    /* Grid */
    .tpl-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    @media (min-width: 640px) { .tpl-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; } }
    @media (min-width: 1024px) { .tpl-grid { grid-template-columns: repeat(4, 1fr); gap: 22px; } }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #ECE7E0 0%, #F4EFE8 50%, #ECE7E0 100%);
      background-size: 600px 100%; animation: shimmer 1.6s infinite linear;
    }

    /* Bottom nav */
    .nav-bar {
      background: rgba(250,250,248,.92);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid #E8E4DE;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      flex: 1; padding: 8px 4px; cursor: pointer; text-decoration: none;
      color: #6B6860; transition: color .2s;
    }
    .nav-item.active { color: #3D6B45; }
    .nav-item.active .nav-label { font-weight: 600; }
    .nav-label { font-size: 10px; font-weight: 500; }

    /* Toast */
    .toast {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: 96px;
      background: #1E2820; color: #fff;
      padding: 12px 20px; border-radius: 100px;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 12px 32px rgba(30,40,32,.30);
      z-index: 80; opacity: 0; pointer-events: none;
      transition: opacity .3s ease, transform .3s ease;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    @media (min-width: 768px) { .toast { bottom: 32px; } }

    /* Loading overlay (for createEvent) */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(250,250,248,.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      z-index: 100;
      opacity: 0; pointer-events: none;
      transition: opacity .25s ease;
    }
    .loading-overlay.show { opacity: 1; pointer-events: auto; }
    .loading-spinner {
      width: 42px; height: 42px;
      border: 2.5px solid rgba(30,40,32,.10);
      border-top-color: #3D6B45;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-style: italic; color: #1E2820;
    }
  </style>
</head>
<body>

<!-- TOP NAV (desktop) -->
<header class="top-nav fixed top-0 left-0 right-0 z-40 hidden md:block">
  <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">

<!-- MOBILE HEADER -->
<header class="mobile-header md:hidden">
  <div class="flex items-center gap-3 px-4 h-14">

      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </a>
    <div class="flex-1 text-center">

<!-- HERO -->
<section class="hero-soft pt-6 md:pt-28 pb-4 md:pb-8 px-5 md:px-6">
  <div class="max-w-6xl mx-auto">
    <div class="reveal">
      <div class="text-[10px] md:text-[11px] tracking-[0.3em] uppercase text-muted font-medium mb-2 md:mb-3">Галерея дизайнов</div>
      <h1 class="font-cormorant text-[40px] md:text-[60px] lg:text-[68px] font-semibold leading-[1.05] tracking-tight">
        Выберите <em class="text-sage">шаблон</em>
      </h1>
      <div class="section-divider mt-3 md:mt-4"></div>
      <p class="text-[14px] md:text-[16px] text-muted mt-3 md:mt-4 max-w-xl leading-relaxed">
        Каждый шаблон создан дизайнерами под конкретное событие. Все тексты, фото и&nbsp;цвета&nbsp;— вы&nbsp;меняете сами.
      </p>

</section>

<!-- Category filters -->
<section class="px-5 md:px-6 pt-4 md:pt-6 pb-2 sticky top-14 md:top-16 z-20"
         style="background: linear-gradient(to bottom, rgba(250,250,248,.96) 70%, rgba(250,250,248,0) 100%); backdrop-filter: blur(10px);">
  <div class="max-w-6xl mx-auto">
    <div id="categoryFilters" class="cat-scroll flex items-center gap-2 md:gap-3"></div>
  </div>
</section>

<!-- CONTENT -->
<main class="max-w-6xl mx-auto px-5 md:px-6 pt-4 md:pt-6 pb-32 md:pb-20">
  <div id="app">
    <div class="tpl-grid">
      <div class="tpl-card"><div class="tpl-preview skeleton" style="aspect-ratio:3/4;"></div><div class="tpl-info"><div class="meta" style="flex:1"><div class="h-4 skeleton rounded w-3/5" style="border-radius:100px;"></div><div class="h-2.5 skeleton rounded w-2/5 mt-2" style="border-radius:100px;"></div></div></div></div>
      <div class="tpl-card"><div class="tpl-preview skeleton" style="aspect-ratio:3/4;"></div><div class="tpl-info"><div class="meta" style="flex:1"><div class="h-4 skeleton rounded w-2/3" style="border-radius:100px;"></div><div class="h-2.5 skeleton rounded w-1/2 mt-2" style="border-radius:100px;"></div></div></div></div>
      <div class="tpl-card hidden sm:flex" style="display:flex; flex-direction:column;"><div class="tpl-preview skeleton" style="aspect-ratio:3/4;"></div><div class="tpl-info"><div class="meta" style="flex:1"><div class="h-4 skeleton rounded w-3/4" style="border-radius:100px;"></div><div class="h-2.5 skeleton rounded w-1/3 mt-2" style="border-radius:100px;"></div></div></div></div>
      <div class="tpl-card hidden lg:flex" style="display:flex; flex-direction:column;"><div class="tpl-preview skeleton" style="aspect-ratio:3/4;"></div><div class="tpl-info"><div class="meta" style="flex:1"><div class="h-4 skeleton rounded w-1/2" style="border-radius:100px;"></div><div class="h-2.5 skeleton rounded w-2/5 mt-2" style="border-radius:100px;"></div></div></div></div>
    </div>

<!-- Toast -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<!-- Loading overlay -->
<div id="loading" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Создаём приглашение…</div>
</div>

<script>
  const API_BASE = '';

  function api(path, opts = {}) {
    const phone = localStorage.getItem('tl_phone');
    return fetch(API_BASE + path, {
      ...opts,
      headers: { 'X-User-Phone': phone, 'Content-Type': 'application/json', ...opts.headers }
    }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); });
  }
  const fetchTemplates = () => api('/api/organizer/templates');
  const createEvent = (body) => api('/api/organizer/events', { method: 'POST', body: JSON.stringify(body) });

  let _toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }
  function setLoading(on) {
    document.getElementById('loading').classList.toggle('show', !!on);
  }

  const CATEGORY_LABELS = {
    WEDDING: 'Свадьба',
    BIRTHDAY: 'День рождения',
    ANNIVERSARY: 'Юбилей',
    TOI: 'Той',
    BABY: 'Бешик той',
    GRADUATION: 'Выпускной',
    OTHER: 'Другое'
  };

  const PREVIEW_DATA = {
    wedding:  { theme: 'tpl-wedding',  names: 'Айжан & Данияр',   date: '12 июня 2026',   sub: 'WEDDING DAY',    ornament: '✦  ✦  ✦' },
    minimal:  { theme: 'tpl-minimal',  names: 'Алина & Эркин',    date: '5 сентября',     sub: 'SAVE THE DATE',  ornament: '—  ✦  —' },
    luxury:   { theme: 'tpl-luxury',   names: 'Айзада & Нурлан',  date: 'Лето 2026',      sub: 'YOU ARE INVITED',ornament: '✦  ·  ✦' },
    birthday: { theme: 'tpl-birthday', names: 'Малене — 30',      date: '18 апреля',      sub: 'BIRTHDAY PARTY', ornament: '✿  ·  ✿' },
    floral:   { theme: 'tpl-floral',   names: 'Алтын & Тимур',    date: 'Август',         sub: 'TÜLÖÖ ТҮКӨН',   ornament: '❀  ·  ❀' },
    toi:      { theme: 'tpl-toi',      names: 'Бекзат — 40 Той',  date: '22 сентября',    sub: 'МЕРЕЙ ТОЙ',      ornament: '✦  ·  ✦' },
    baby:     { theme: 'tpl-baby',     names: 'Айлин',            date: '40 күн',         sub: 'БЕШИК ТОЙ',      ornament: '✿  ·  ✿' },
    modern:   { theme: 'tpl-modern',   names: 'Лейла & Адиль',    date: '15.06.2026',     sub: 'WEDDING',        ornament: '—  ·  —' }
  };

  const PREDEFINED_TEMPLATES = [
    { id: 1, name: 'Классика',   category: 'WEDDING',     preview: 'wedding',  description: 'Тёмный изумруд',    premium: false },
    { id: 2, name: 'Минимализм', category: 'WEDDING',     preview: 'minimal',  description: 'Кремовый и нежный', premium: false },
    { id: 3, name: 'Роскошь',    category: 'WEDDING',     preview: 'luxury',   description: 'Ночь и золото',     premium: true  },
    { id: 4, name: 'Модерн',     category: 'WEDDING',     preview: 'modern',   description: 'Чёрный гранит',     premium: false },
    { id: 5, name: 'Цветущий',   category: 'BIRTHDAY',    preview: 'birthday', description: 'Розовый нежный',    premium: false },
    { id: 6, name: 'Лесной',     category: 'TOI',         preview: 'floral',   description: 'Зелень и природа',  premium: false },
    { id: 7, name: 'Той',        category: 'TOI',         preview: 'toi',      description: 'Бордо и охра',      premium: true  },
    { id: 8, name: 'Бешик Той',  category: 'BABY',        preview: 'baby',     description: 'Тёплый беж',        premium: false }
  ];

  let _allTemplates = [];
  let _activeCategory = 'ALL';

  function renderCategoryFilters() {
    const counts = { ALL: _allTemplates.length };
    _allTemplates.forEach(t => {
      const c = t.category || 'OTHER';
      counts[c] = (counts[c] || 0) + 1;
    });

    const cats = ['ALL', ...Object.keys(CATEGORY_LABELS).filter(c => counts[c])];
    const el = document.getElementById('categoryFilters');
    el.innerHTML = cats.map(c => {
      const label = c === 'ALL' ? 'Все' : CATEGORY_LABELS[c];
      return `<button class="cat-chip ${c === _activeCategory ? 'active' : ''}" data-cat="${c}">
        ${label}<span class="count">${counts[c] || 0}</span>
      </button>`;
    }).join('');

    el.querySelectorAll('.cat-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        _activeCategory = btn.dataset.cat;
        el.querySelectorAll('.cat-chip').forEach(b => b.classList.toggle('active', b.dataset.cat === _activeCategory));
        renderGrid();
      });
    });
  }

  function templateCard(t) {
    const p = PREVIEW_DATA[t.preview] || PREVIEW_DATA.wedding;
    const isDark = ['wedding','luxury','toi','modern'].includes(t.preview);
    return `
      <article class="tpl-card fade-in" onclick='selectTemplate(${t.id}, ${JSON.stringify(t.name).replace(/'/g, "&#39;")})'>
        <span class="tpl-badge ${isDark ? 'dark' : ''}">${CATEGORY_LABELS[t.category] || t.category}</span>
        ${t.premium ? `<span class="tpl-premium-tag">
          <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 1l2.39 6.47L19 8.26l-5.27 4.5L15.5 19 10 15.27 4.5 19l1.77-6.24L1 8.26l6.61-.79L10 1z"/></svg>
          Premium
        </span>` : ''}
        <div class="tpl-preview ${p.theme}">
          <div class="tpl-ornament-top ornament">${p.ornament}</div>
          <div class="sub" style="margin-top:10px;">${p.sub}</div>
          <div class="names">${p.names}</div>
          <div class="tpl-ornament-bottom ornament">${p.ornament}</div>
          <div class="date">${p.date}</div>
        </div>
        <div class="tpl-info">
          <div class="meta">
            <div class="name">${t.name}</div>
            <div class="cat">${t.description || CATEGORY_LABELS[t.category]}</div>
          </div>
          <div class="tpl-cta">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
          </div>
        </div>
      </article>`;
  }

  function renderGrid() {
    const list = _activeCategory === 'ALL'
      ? _allTemplates
      : _allTemplates.filter(t => t.category === _activeCategory);

    const app = document.getElementById('app');
    if (list.length === 0) {
      app.innerHTML = `
        <div class="flex flex-col items-center justify-center text-center py-16 md:py-24 fade-in">
          <div class="w-16 h-16 rounded-2xl bg-cream3 flex items-center justify-center mb-5">
            <svg class="w-7 h-7 text-muted" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          </div>
          <h3 class="font-cormorant italic text-[24px] text-ink mb-2">Пока нет шаблонов</h3>
          <p class="text-muted text-[14px]">В этой категории шаблоны скоро появятся.</p>
        </div>`;
    } else {
      app.innerHTML = `<div class="tpl-grid">${list.map(templateCard).join('')}</div>`;
    }
    observeFadeIn();
  }

  async function selectTemplate(templateId, name) {
    setLoading(true);
    try {
      const ev = await createEvent({ title: name || 'Моё приглашение', templateId });
      location.href = `/editor.html?id=${ev.id}`;
    } catch (e) {
      console.error(e);
      showToast('Не удалось создать — попробуйте снова');
      setLoading(false);
    }
  }
  window.selectTemplate = selectTemplate;

  function observeFadeIn() {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
      });
    }, { threshold: 0.05 });
    document.querySelectorAll('.fade-in:not(.visible)').forEach(el => io.observe(el));
  }

  function revealHero() {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
  }

  async function init() {
    revealHero();
    try {
      const templates = await fetchTemplates();
      _allTemplates = (templates && templates.length > 0) ? templates : PREDEFINED_TEMPLATES;
    } catch {
      _allTemplates = PREDEFINED_TEMPLATES;
    }
    renderCategoryFilters();
    renderGrid();
  }

  init();
</script>
</body>
</html>
