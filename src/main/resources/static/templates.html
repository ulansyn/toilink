<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>ToiLink — Выбор шаблона</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/tokens.css"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/components.css"/>

  <style>
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
      background: rgba(250, 249, 247, 0.9);
      backdrop-filter: blur(var(--blur-frosted));
      border-bottom: 1px solid var(--color-border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      height: var(--header-height);
      padding: 0 var(--space-6);
    }

    .header-back {
      width: var(--touch-target-min);
      height: var(--touch-target-min);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-secondary);
      border-radius: var(--radius-full);
      transition: all var(--duration-normal) var(--ease-out);
    }

    .header-back:hover {
      background: var(--color-surface-hover);
      color: var(--color-text);
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: var(--text-h3-size);
      font-weight: var(--weight-medium);
      flex: 1;
    }

    .main {
      flex: 1;
      padding: var(--space-6);
      padding-bottom: var(--space-12);
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: var(--text-h3-size);
      font-weight: var(--weight-medium);
      margin-bottom: var(--space-6);
    }

    .templates-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-4);
    }

    @media (min-width: 600px) {
      .templates-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .template-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .template-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card);
    }

    .template-card:active {
      transform: scale(0.98);
    }

    .template-preview {
      height: 8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
      position: relative;
    }

    .template-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.2), transparent 50%);
    }

    .template-preview.wedding {
      background: linear-gradient(135deg, #2C4A30 0%, #1E2820 100%);
      color: white;
    }

    .template-preview.minimal {
      background: linear-gradient(135deg, #FAF9F7 0%, #EDE8E0 100%);
      color: var(--color-text);
    }

    .template-preview.luxury {
      background: linear-gradient(135deg, #1A0A2E 0%, #2D1B4E 100%);
      color: #D4AF7A;
    }

    .template-preview.birthday {
      background: linear-gradient(135deg, #FDF6F0 0%, #F9EDE0 100%);
      color: #8B4A3C;
    }

    .template-preview.floral {
      background: linear-gradient(135deg, #F0F5F1 0%, #E8EFE6 100%);
      color: #4A7C59;
    }

    .template-preview-name {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: var(--weight-medium);
      position: relative;
      z-index: 1;
    }

    .template-preview-date {
      font-size: var(--text-caption-size);
      opacity: 0.7;
      position: relative;
      z-index: 1;
    }

    .template-info {
      padding: var(--space-3) var(--space-4);
    }

    .template-name {
      font-size: var(--text-small-size);
      font-weight: var(--weight-medium);
    }

    .template-category {
      font-size: var(--text-caption-size);
      color: var(--color-text-muted);
    }

    /* Category sections */
    .category-section {
      margin-bottom: var(--space-10);
    }

    /* Loading state */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .loading-spinner {
      width: 2rem;
      height: 2rem;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="page" id="app">
    <div class="loading-overlay" id="loading">
      <div class="loading-spinner"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const API_BASE = '';

    function api(path, opts = {}) {
      const phone = localStorage.getItem('tl_phone');
      return fetch(API_BASE + path, {
        ...opts,
        headers: {
          'X-User-Phone': phone,
          'Content-Type': 'application/json',
          ...opts.headers
        }
      }).then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      });
    }

    const fetchTemplates = () => api('/api/organizer/templates');
    const createEvent = (body) => api('/api/organizer/events', {
      method: 'POST',
      body: JSON.stringify(body)
    });

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    // Category labels
    const CATEGORY_LABELS = {
      WEDDING: 'Свадьба',
      BIRTHDAY: 'День рождения',
      ANNIVERSARY: 'Юбилей',
      TOI: 'Той',
      BABY: 'Бешик той',
      GRADUATION: 'Выпускной',
      OTHER: 'Другое'
    };

    // Predefined templates (for initial demo, when API is empty)
    const PREDEFINED_TEMPLATES = [
      { id: 1, name: 'Классика', category: 'WEDDING', preview: 'wedding', description: 'Элегантный тёмный' },
      { id: 2, name: 'Минимализм', category: 'WEDDING', preview: 'minimal', description: 'Кремовый нежный' },
      { id: 3, name: 'Роскошь', category: 'WEDDING', preview: 'luxury', description: 'Ночь и золото' },
      { id: 4, name: 'Цветочный', category: 'BIRTHDAY', preview: 'birthday', description: 'Нежный розовый' },
      { id: 5, name: 'Лесной', category: 'TOI', preview: 'floral', description: 'Природа и зелень' },
    ];

    function renderPage(templates) {
      // Use predefined templates if API returns empty
      const allTemplates = templates.length > 0 ? templates : PREDEFINED_TEMPLATES;

      // Group by category
      const groups = {};
      allTemplates.forEach(t => {
        const cat = t.category || 'OTHER';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(t);
      });

      const categories = Object.keys(groups);

      let html = `
        <header class="header">
          <div class="header-inner">
            <a href="/" class="header-back" aria-label="Назад">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 19l-7-7 7-7"/>
              </svg>
            </a>
            <h1 class="header-title">Выберите шаблон</h1>
          </div>
        </header>
        <main class="main">
      `;

      categories.forEach(cat => {
        const label = CATEGORY_LABELS[cat] || cat;
        const tpls = groups[cat];

        html += `
          <section class="category-section">
            <h2 class="section-title">${label}</h2>
            <div class="templates-grid">
        `;

        tpls.forEach(t => {
          html += `
            <div class="template-card" onclick="selectTemplate(${t.id}, '${t.name}')">
              <div class="template-preview ${t.preview || 'wedding'}">
                <p class="template-preview-name">${t.name}</p>
                <p class="template-preview-date">${t.description || ''}</p>
              </div>
              <div class="template-info">
                <p class="template-name">${t.name}</p>
                <p class="template-category">${t.description || ''}</p>
              </div>
            </div>
          `;
        });

        html += '</div></section>';
      });

      html += '</main>';
      document.getElementById('app').innerHTML = html;
      document.getElementById('loading').style.display = 'none';
    }

    async function selectTemplate(templateId, name) {
      document.getElementById('loading').style.display = 'flex';

      try {
        const ev = await createEvent({
          title: name || 'Моё приглашение',
          templateId: templateId
        });

        location.href = `/editor.html?id=${ev.id}`;
      } catch (e) {
        console.error(e);
        showToast('Не удалось создать — попробуйте снова');
        document.getElementById('loading').style.display = 'none';
      }
    }

    // Check auth
    async function init() {
      const phone = localStorage.getItem('tl_phone');
      if (!phone) {
        location.href = '/landing.html';
        return;
      }

      try {
        const templates = await fetchTemplates();
        renderPage(templates);
      } catch (e) {
        // Use predefined templates on error
        renderPage([]);
      }
    }

    init();
  </script>
</body>
</html>
