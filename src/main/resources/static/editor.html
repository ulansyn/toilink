<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ToiLink — Редактор приглашения</title>
  <meta name="theme-color" content="#fff8fb" />

    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/inter-500.woff2">
    <link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/cormorant-500.woff2">
    <link rel="stylesheet" href="/css/fonts.css">
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/date-time-picker.css" />
  <link rel="stylesheet" href="/css/mobile-editor.css" />
</head>
<body data-app-page="editor">
  <main class="editor-device" id="editorDevice" data-snap="closed">
    <div class="editor-topbar" aria-label="Действия редактора">
      <a class="topbar-button topbar-back" href="/" aria-label="Назад">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
        <span>Назад</span>
      </a>
      <div class="topbar-actions">
        <button class="topbar-button topbar-icon" type="button" id="undoBtn" aria-label="Назад по изменениям" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-1"/></svg>
        </button>
        <button class="topbar-button topbar-icon" type="button" id="redoBtn" aria-label="Вперёд по изменениям" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h1"/></svg>
        </button>
        <button class="topbar-button topbar-save" type="button" id="saveBtn" aria-label="Сохранить">Сохранить</button>
      </div>
    </div>

    <section class="preview-stage" id="previewStage" aria-label="Предпросмотр сайта">
      <iframe
        id="previewFrame"
        class="preview-frame"
        src="/templates/template-1/index.html?mode=preview"
        title="Предпросмотр свадебного сайта"
      ></iframe>
    </section>

    <button class="sheet-backdrop" id="sheetBackdrop" type="button" aria-label="Закрыть редактор"></button>

    <nav class="floating-nav" id="blockNav" aria-label="Разделы приглашения">
      <button class="nav-item" type="button" data-section="cover" aria-label="Обложка">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="m8 14 2.6-2.6a2 2 0 0 1 2.8 0L19 17"/><path d="M8.5 8.5h.01"/></svg>
        <span>Обложка</span>
      </button>
      <button class="nav-item" type="button" data-section="text" aria-label="Текст">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16"/><path d="M4 12h14"/><path d="M4 18h10"/></svg>
        <span>Текст</span>
      </button>
      <button class="nav-item" type="button" data-section="photos" aria-label="Фото">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7a2 2 0 0 1 2-2h2l1.5-2h5L16 5h2a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"/><circle cx="12" cy="13" r="3"/></svg>
        <span>Фото</span>
      </button>
      <button class="nav-item" type="button" data-section="calendar" aria-label="Календарь">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2v4"/><path d="M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M3 10h18"/></svg>
        <span>Календарь</span>
      </button>
      <button class="nav-item" type="button" data-section="timeline" aria-label="Таймлайн">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span>Таймлайн</span>
      </button>
      <button class="nav-item" type="button" data-section="location" aria-label="Место">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 5-8 12-8 12S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Место</span>
      </button>
      <button class="nav-item" type="button" data-section="dresscode" aria-label="Дресс-код">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 21a4 4 0 0 1-4-4V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v12a4 4 0 0 1-4 4Z"/><path d="M7 17h.01"/><path d="M11 7.3 13 5.3a2 2 0 0 1 2.8 0l2.9 2.9a2 2 0 0 1 0 2.8L10.2 19.5"/></svg>
        <span>Дресс</span>
      </button>
      <button class="nav-item" type="button" data-section="rsvp" aria-label="Анкета">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 11l2 2 4-4"/><path d="M20 6 9 17l-5-5"/><rect x="4" y="3" width="16" height="18" rx="3"/></svg>
        <span>Анкета</span>
      </button>
    </nav>

    <section class="editor-sheet" id="editorSheet" aria-label="Панель редактирования">
      <div class="sheet-handle-zone" id="sheetHandle" role="button" tabindex="0" aria-label="Изменить высоту панели">
        <div class="sheet-handle"></div>
      </div>
      <header class="sheet-header">
        <div class="sheet-header-title" id="sheetTitle"></div>
        <div class="sheet-actions">
          <button class="icon-button" type="button" id="expandSheet" aria-label="Развернуть">
            <svg id="expandSheetIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 15 6-6 6 6"/></svg>
          </button>
          <button class="icon-button" type="button" id="closeSheet" aria-label="Закрыть">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
      </header>
      <div class="sheet-body" id="sheetBody"></div>
      <div class="sheet-scroll-rail" aria-hidden="true"><span id="sheetScrollThumb"></span></div>
    </section>

    <div class="keyboard-toolbar" id="keyboardToolbar" aria-label="Панель клавиатуры">
      <button type="button" id="prevField">Назад</button>
      <button type="button" id="nextField">Далее</button>
      <button type="button" class="done" id="doneKeyboard">Готово</button>
    </div>
  </main>

  <script src="/js/date-time-picker.js"></script>
  <script src="/js/mobile-editor.js"></script>
</body>
</html>
