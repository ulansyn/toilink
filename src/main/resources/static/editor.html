<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToiLink — Редактор события</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            cormorant: ['Cormorant Garamond', 'serif'],
          },
          colors: { sage: '#6B8F71', cream: '#FAFAF8', graphite: '#1E2820' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-cormorant { font-family: 'Cormorant Garamond', serif; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#FAFAF8] text-[#1E2820] min-h-screen">

  <!-- ── Desktop Top Navbar (md+) ─────────────────────────────────────── -->
  <header class="hidden md:flex sticky top-0 z-30 bg-[#FAFAF8]/80 backdrop-blur-md border-b border-[#E5E0D8] px-8 py-4 items-center justify-between">
    <a href="/" class="font-cormorant text-2xl font-semibold italic text-[#1E2820]">ToiLink</a>
    <nav class="flex items-center gap-8">
      <a href="/" class="text-sm text-[#1E2820]/50 hover:text-[#1E2820] transition-colors">Мои события</a>
      <a href="/editor.html" class="text-sm text-[#6B8F71] font-medium">Создать</a>
    </nav>
    <a href="/" class="text-sm text-[#1E2820]/40 hover:text-[#1E2820] transition-colors">← Назад</a>
  </header>

  <!-- ── Mobile Header ─────────────────────────────────────────────────── -->
  <header class="md:hidden flex items-center justify-between px-5 pt-6 pb-2">
    <a href="/" class="w-9 h-9 rounded-xl border border-[#E5E0D8] flex items-center justify-center text-[#1E2820]/40 active:scale-95 transition-transform">←</a>
    <span class="font-cormorant text-xl font-semibold italic text-[#1E2820]">ToiLink</span>
    <div class="w-9"></div>
  </header>

  <!-- ── Main ──────────────────────────────────────────────────────────── -->
  <main class="max-w-2xl mx-auto px-4 md:px-8 pt-4 pb-28 md:pb-12">

    <!-- Step 1: Template picker -->
    <div id="step1"></div>

    <!-- Step 2: Form (hidden initially) -->
    <div id="step2" class="hidden"></div>

  </main>

  <!-- ── Bottom Navigation Bar (mobile only) ───────────────────────────── -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-30 bg-[#FAFAF8]/95 backdrop-blur-md border-t border-[#E5E0D8] pb-safe">
    <div class="flex items-center justify-around px-2 pt-2 pb-3">

      <a href="/" class="flex flex-col items-center gap-1 min-w-[56px] text-[#1E2820]/30">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-[10px] font-medium">Главная</span>
      </a>

      <a href="/editor.html" class="flex flex-col items-center gap-1 -mt-5 min-w-[56px]">
        <div class="w-14 h-14 bg-[#1E2820] rounded-2xl flex items-center justify-center shadow-lg">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <span class="text-[10px] font-medium text-[#6B8F71]">Создать</span>
      </a>

      <div class="flex flex-col items-center gap-1 min-w-[56px] text-[#1E2820]/30">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-[10px] font-medium">Профиль</span>
      </div>

    </div>
  </nav>

  <script src="/js/editor.js"></script>
</body>
</html>
