<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Perfect Luminous Circle</title>
    <style>
        :root {
            /* Базовые оттенки оригинала */
            --bg-base: #f7eee1;
            --circle-center: #fff9f1;
            --circle-rim: #e7cca7;
            --white-glow: rgba(255, 255, 255, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #faf2e7;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 600px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Тени растений (имитация органики) */
        .shadow-plant {
            position: absolute;
            width: 300px;
            height: 300px;
            filter: blur(40px);
            opacity: 0.15;
            background: radial-gradient(circle, #8d7a60 0%, transparent 70%);
            z-index: 1;
        }
        .sp-left { bottom: -50px; left: -50px; transform: rotate(-15deg); }

        /* КРУГ С ВНУТРЕННИМИ БЕЛЫМИ ТЕНЯМИ */
        .circle {
            position: relative;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            z-index: 5;

            /* Сложный внутренний градиент — эллипс для углов */
            background: radial-gradient(
                    ellipse 92% 88% at 47% 47%,
                    var(--circle-center) 0%,
                    #fcf4e8 42%,
                    var(--circle-rim) 88%,
                    #d3b58c 100%
            );

            /* Чистая тонкая окантовка */
            box-shadow:
                /* Верх-лево и низ-право: узкая чёткая кайма */
                inset 3px 3px 3px 0px rgba(255,255,255,0.8),
                inset -3px -3px 3px 0px rgba(255,255,255,0.8),
                /* Остальное свечение */
                inset 0 0 25px 4px rgba(255,255,255,0.6),
                inset 0 0 60px 10px rgba(255,255,255,0.3),
                /* Внешнее свечение (Halo) */
                0 0 2px 1px var(--white-glow),
                0 0 15px 3px rgba(255, 255, 255, 0.8),
                0 0 40px 10px rgba(255, 255, 255, 0.4),
                0 0 90px 25px rgba(255, 255, 255, 0.15);
        }

        /* БЛИКИ (Sparkles) */
        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            z-index: 10;
            filter: drop-shadow(0 0 3px white);
        }

        /* Лучи бликов */
        .sparkle::before, .sparkle::after {
            content: "";
            position: absolute;
            top: 50%; left: 50%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
            transform: translate(-50%, -50%);
        }
        .sparkle::before { width: 1px; height: 1000%; } /* Вертикаль */
        .sparkle::after { width: 1000%; height: 1px; } /* Горизонт */

        /* Точные позиции с картинки */
        .s1 { top: 46%; left: 6%; width: 3px; height: 3px; opacity: 0.8; }
        .s1::before { height: 20px; } .s1::after { width: 20px; }

        .s2 { top: 43%; right: 7%; width: 4px; height: 4px; opacity: 0.9; }
        .s2::before { height: 30px; } .s2::after { width: 30px; }

        .s3 { bottom: 15%; right: 18%; width: 2px; height: 2px; opacity: 0.6; transform: rotate(45deg); }
        .s3::before { height: 12px; } .s3::after { width: 12px; }

    </style>
</head>
<body>

<div class="container">
    <div class="shadow-plant sp-left"></div>

    <div class="circle"></div>

    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
</div>

</body>
</html>
