<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToiLink — Мои приглашения</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
            cormorant: ['Cormorant Garamond', 'serif'],
          },
          colors: { sage: '#6B8F71', cream: '#FAFAF8', graphite: '#1E2820' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-cormorant { font-family: 'Cormorant Garamond', serif; }
    .fade-in { opacity: 0; transform: translateY(12px); transition: opacity 0.45s ease, transform 0.45s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-[#FAFAF8] text-[#1E2820] min-h-screen">

  <!-- ── Desktop Top Navbar (md+) ─────────────────────────────────────── -->
  <header class="hidden md:flex sticky top-0 z-30 bg-[#FAFAF8]/80 backdrop-blur-md border-b border-[#E5E0D8] px-8 py-4 items-center justify-between">
    <a href="/" class="font-cormorant text-2xl font-semibold text-[#1E2820] italic">ToiLink</a>
    <nav class="flex items-center gap-8">
      <a href="/" class="text-sm text-[#6B8F71] font-medium">Мои события</a>
      <a href="/editor.html" class="text-sm text-[#1E2820]/50 hover:text-[#1E2820] transition-colors">Создать</a>
    </nav>
    <div class="flex items-center gap-3">
      <span class="text-xs text-[#1E2820]/40 user-phone"></span>
      <a href="/editor.html" class="px-5 py-2.5 bg-[#1E2820] text-white rounded-xl text-sm font-medium hover:bg-[#2d3d2e] transition-colors">
        + Создать
      </a>
    </div>
  </header>

  <!-- ── Mobile Header ─────────────────────────────────────────────────── -->
  <header class="md:hidden flex items-center justify-between px-5 pt-6 pb-2">
    <span class="font-cormorant text-2xl font-semibold italic text-[#1E2820]">ToiLink</span>
    <span class="text-xs text-[#1E2820]/30 user-phone"></span>
  </header>

  <!-- ── Main content ──────────────────────────────────────────────────── -->
  <main class="max-w-5xl mx-auto px-4 md:px-8 pt-4 pb-28 md:pb-10">

    <!-- Page title -->
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="font-cormorant text-3xl md:text-4xl font-semibold text-[#1E2820]">Мои события</h1>
        <p class="text-[#1E2820]/40 text-sm mt-1">Все ваши приглашения</p>
      </div>
      <a href="/editor.html"
        class="md:hidden w-12 h-12 bg-[#1E2820] text-white rounded-2xl flex items-center justify-center text-2xl active:scale-95 transition-transform shadow-md">
        +
      </a>
    </div>

    <!-- Events list (rendered by dashboard.js) -->
    <div id="content">
      <!-- Loading skeleton -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        ${[1,2,3].map(() => `
          <div class="bg-white rounded-3xl overflow-hidden shadow-sm animate-pulse">
            <div class="h-40 bg-[#E5E0D8]"></div>
            <div class="p-5 space-y-3">
              <div class="h-5 bg-[#E5E0D8] rounded-lg w-3/4"></div>
              <div class="h-3 bg-[#E5E0D8] rounded-lg w-1/2"></div>
              <div class="h-3 bg-[#E5E0D8] rounded-lg w-2/3"></div>
              <div class="flex gap-2 pt-2">
                <div class="flex-1 h-9 bg-[#E5E0D8] rounded-xl"></div>
                <div class="flex-1 h-9 bg-[#E5E0D8] rounded-xl"></div>
                <div class="flex-1 h-9 bg-[#E5E0D8] rounded-xl"></div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>
  </main>

  <!-- ── Bottom Navigation Bar (mobile only) ───────────────────────────── -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 z-30 bg-[#FAFAF8]/95 backdrop-blur-md border-t border-[#E5E0D8] pb-safe">
    <div class="flex items-center justify-around px-2 pt-2 pb-3">

      <!-- Home -->
      <a href="/" data-tab="home" class="flex flex-col items-center gap-1 min-w-[56px] text-[#6B8F71]">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        <span class="text-[10px] font-medium">Главная</span>
      </a>

      <!-- Create (center, elevated) -->
      <a href="/editor.html" data-tab="create"
        class="flex flex-col items-center gap-1 -mt-5 min-w-[56px] text-[#1E2820]/30">
        <div class="w-14 h-14 bg-[#1E2820] rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-transform">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </div>
        <span class="text-[10px] font-medium text-[#1E2820]/30">Создать</span>
      </a>

      <!-- Profile -->
      <button data-tab="profile" onclick="showProfile()"
        class="flex flex-col items-center gap-1 min-w-[56px] text-[#1E2820]/30">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span class="text-[10px] font-medium">Профиль</span>
      </button>

    </div>
  </nav>

  <script>
    window.showProfile = function() {
      const phone = localStorage.getItem('tl_phone') || 'Не задан';
      const sheet = document.createElement('div');
      const backdrop = document.createElement('div');
      backdrop.className = 'fixed inset-0 bg-black/40 z-40 backdrop-blur-sm';
      backdrop.onclick = () => { backdrop.remove(); sheet.remove(); };
      sheet.className = 'fixed bottom-0 left-0 right-0 z-50 bg-[#FAFAF8] rounded-t-3xl p-6 pb-10';
      sheet.innerHTML = `
        <div class="w-10 h-1 bg-[#1E2820]/10 rounded-full mx-auto mb-6"></div>
        <p class="font-cormorant text-2xl font-semibold mb-1">Профиль</p>
        <p class="text-[#1E2820]/40 text-sm mb-6">${phone}</p>
        <button onclick="localStorage.removeItem('tl_phone'); location.reload()"
          class="w-full py-3.5 border border-[#E5E0D8] rounded-2xl text-[#1E2820]/60 text-sm font-medium active:scale-[0.98] transition-transform">
          Сменить аккаунт
        </button>`;
      document.body.appendChild(backdrop);
      document.body.appendChild(sheet);
      sheet.style.transform = 'translateY(100%)';
      sheet.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
      requestAnimationFrame(() => { sheet.style.transform = 'translateY(0)'; });
    };
  </script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
