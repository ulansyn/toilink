<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>ToiLink — Панель</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="/css/tokens.css"/>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/components.css"/>

  <style>
    /* ─── Dashboard Specific ───────────────────────────────── */

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
      background: rgba(250, 249, 247, 0.9);
      backdrop-filter: blur(var(--blur-frosted));
      border-bottom: 1px solid var(--color-border);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: var(--header-height);
      padding: 0 var(--space-6);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: var(--weight-medium);
      font-style: italic;
      color: var(--color-text);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* Main */
    .main {
      flex: 1;
      padding: var(--space-6);
      padding-bottom: calc(var(--bottom-nav-height) + var(--safe-area-bottom) + var(--space-8));
      max-width: var(--container-wide);
      margin: 0 auto;
      width: 100%;
    }

    /* Page Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: var(--text-h2-size);
      font-weight: var(--weight-medium);
    }

    /* Events Grid */
    .events-grid {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    /* Event Card */
    .event-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--duration-normal) var(--ease-out);
    }

    .event-card:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-card);
    }

    .event-card:active {
      transform: scale(0.99);
    }

    .event-cover {
      height: 6rem;
      background: linear-gradient(135deg, #3D6B45 0%, #2C4A30 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      position: relative;
    }

    .event-cover.has-image {
      background: none;
    }

    .event-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .event-cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
    }

    .event-cover-text {
      position: relative;
      z-index: 1;
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: var(--weight-medium);
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .event-badge {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
    }

    .event-body {
      padding: var(--space-4);
    }

    .event-title {
      font-family: var(--font-serif);
      font-size: var(--text-h3-size);
      font-weight: var(--weight-medium);
      margin-bottom: var(--space-1);
    }

    .event-meta {
      font-size: var(--text-small-size);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-3);
    }

    .event-actions {
      display: flex;
      gap: var(--space-2);
    }

    .event-actions .btn {
      flex: 1;
    }

    /* Empty State */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-6);
      text-align: center;
    }

    .empty-icon {
      width: 5rem;
      height: 5rem;
      margin-bottom: var(--space-6);
      color: var(--color-text-muted);
    }

    .empty-title {
      font-family: var(--font-serif);
      font-size: var(--text-h3-size);
      font-weight: var(--weight-medium);
      margin-bottom: var(--space-2);
    }

    .empty-text {
      font-size: var(--text-small-size);
      color: var(--color-text-muted);
      max-width: 16rem;
      margin-bottom: var(--space-6);
    }

    /* Stats Row (for published events) */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .stat-item {
      text-align: center;
      padding: var(--space-3);
      background: var(--color-bg);
      border-radius: var(--radius-lg);
    }

    .stat-value {
      font-size: var(--text-h3-size);
      font-weight: var(--weight-semibold);
      color: var(--color-text);
    }

    .stat-label {
      font-size: var(--text-caption-size);
      color: var(--color-text-muted);
    }

    /* Link Card */
    .link-card {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-bg);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-4);
      cursor: pointer;
      transition: background var(--duration-normal) var(--ease-out);
    }

    .link-card:hover {
      background: var(--color-surface-hover);
    }

    .link-icon {
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-success-bg);
      color: var(--color-success);
      border-radius: var(--radius-lg);
      flex-shrink: 0;
    }

    .link-text {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: var(--text-caption-size);
      color: var(--color-text-muted);
    }

    .link-url {
      font-size: var(--text-small-size);
      font-weight: var(--weight-medium);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
    }

    /* Profile Sheet */
    .profile-sheet-content {
      padding: 0 var(--space-6) var(--space-6);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      padding: var(--space-4);
      background: var(--color-bg);
      border-radius: var(--radius-xl);
      margin-bottom: var(--space-6);
    }

    .profile-avatar {
      width: 3.5rem;
      height: 3.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-gold);
      color: white;
      font-size: 1.25rem;
      font-weight: var(--weight-semibold);
      border-radius: var(--radius-full);
    }

    .profile-info {
      flex: 1;
    }

    .profile-name {
      font-weight: var(--weight-medium);
    }

    .profile-phone {
      font-size: var(--text-small-size);
      color: var(--color-text-muted);
    }

    /* Loading Skeleton */
    .skeleton-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }

    .skeleton-cover {
      height: 6rem;
      background: var(--color-border);
    }

    .skeleton-body {
      padding: var(--space-4);
    }

    .skeleton-line {
      height: 1rem;
      background: var(--color-border);
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-2);
    }
  </style>
</head>
<body>
  <div class="page" id="app">
    <!-- Content loaded dynamically -->
  </div>

  <!-- Auth Sheet -->
  <div id="auth-container"></div>

  <!-- Toast -->
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- Bottom Nav Template -->
  <template id="bottom-nav-template">
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <a href="/" class="bottom-nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span>Главная</span>
        </a>
        <a href="/guests.html" class="bottom-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span>Гости</span>
        </a>
        <button class="bottom-nav-fab" id="create-btn" aria-label="Создать">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 4v16m8-8H4"/>
          </svg>
        </button>
        <a href="/templates.html" class="bottom-nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Шаблоны</span>
        </a>
        <button class="bottom-nav-item" id="profile-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <span>Профиль</span>
        </button>
      </div>
    </nav>
  </template>

  <script src="/js/auth.js"></script>
  <script>
    // ─── Config ───────────────────────────────────────────────
    const API_BASE = '';

    // ─── API ─────────────────────────────────────────────────
    function api(path, opts = {}) {
      const phone = localStorage.getItem('tl_phone');
      return fetch(API_BASE + path, {
        ...opts,
        headers: {
          'X-User-Phone': phone,
          'Content-Type': 'application/json',
          ...opts.headers
        }
      }).then(r => {
        if (!r.ok) throw new Error(r.status);
        return r.json();
      });
    }

    const fetchEvents = () => api('/api/organizer/events');
    const fetchStats = (id) => api(`/api/organizer/events/${id}/stats`);
    const createEvent = (body) => api('/api/organizer/events', {
      method: 'POST',
      body: JSON.stringify(body)
    });
    const deleteEvent = (id) => fetch(API_BASE + `/api/organizer/events/${id}`, {
      method: 'DELETE',
      headers: { 'X-User-Phone': localStorage.getItem('tl_phone') }
    }).then(r => { if (!r.ok) throw new Error(r.status); });

    // ─── Utils ───────────────────────────────────────────────
    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('visible');
      setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    function copyLink(slug) {
      const url = `${location.origin}/e/${slug}`;
      navigator.clipboard.writeText(url)
        .then(() => showToast('Ссылка скопирована'))
        .catch(() => {
          prompt('Скопируйте ссылку:', url);
        });
    }

    // ─── Auth Check ─────────────────────────────────────────
    async function checkAuth() {
      const phone = localStorage.getItem('tl_phone');
      if (!phone) {
        // Redirect to landing
        location.href = '/landing.html';
        return null;
      }
      return phone;
    }

    // ─── Render Functions ───────────────────────────────────
    function renderSkeleton() {
      return `
        <div class="skeleton-card">
          <div class="skeleton-cover"></div>
          <div class="skeleton-body">
            <div class="skeleton-line" style="width: 70%"></div>
            <div class="skeleton-line" style="width: 50%"></div>
          </div>
        </div>
      `;
    }

    function renderBottomNav() {
      const template = document.getElementById('bottom-nav-template');
      document.body.appendChild(template.content.cloneNode(true));

      document.getElementById('create-btn').addEventListener('click', () => {
        location.href = '/templates.html';
      });

      document.getElementById('profile-btn').addEventListener('click', openProfileSheet);
    }

    function renderPage(content) {
      document.getElementById('app').innerHTML = content;
      // Render bottom nav
      renderBottomNav();
    }

    // ─── Views ───────────────────────────────────────────────
    async function renderEmptyState() {
      renderPage(`
        <main class="main">
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <rect x="3" y="3" width="18" height="18" rx="2"/>
              <path d="M12 8v8m-4-4h8"/>
            </svg>
            <h2 class="empty-title">Нет приглашений</h2>
            <p class="empty-text">Создайте своё первое приглашение — это займёт всего 5 минут</p>
            <button class="btn btn-gold" onclick="location.href='/templates.html'">
              Создать приглашение
            </button>
          </div>
        </main>
      `);
    }

    async function renderSingleDraft(event) {
      const coverHtml = event.coverImageUrl
        ? `<img src="${event.coverImageUrl}" alt=""/><div class="event-cover-overlay"></div>`
        : '';

      renderPage(`
        <main class="main">
          <div class="page-header">
            <h1 class="page-title">Мои события</h1>
          </div>

          <div class="events-grid">
            <div class="event-card" onclick="location.href='/editor.html?id=${event.id}'">
              <div class="event-cover ${event.coverImageUrl ? 'has-image' : ''}">
                ${coverHtml}
                <span class="event-cover-text">${event.title}</span>
                <span class="event-badge badge badge-draft">Черновик</span>
              </div>
              <div class="event-body">
                <h2 class="event-title">${event.title}</h2>
                <p class="event-meta">
                  ${event.person1 || event.person2 ? `${event.person1 || ''} ${event.person2 ? '& ' + event.person2 : ''}` : ''}
                  ${event.eventDate ? ' • ' + formatDate(event.eventDate) : ''}
                </p>
                <div class="event-actions">
                  <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); deleteEventById(${event.id})">
                    Удалить
                  </button>
                  <button class="btn btn-gold btn-sm" onclick="event.stopPropagation(); location.href='/editor.html?id=${event.id}'">
                    Редактировать
                  </button>
                </div>
              </div>
            </div>
          </div>
        </main>
      `);
    }

    async function renderSinglePublished(event, stats) {
      const coverHtml = event.coverImageUrl
        ? `<img src="${event.coverImageUrl}" alt=""/><div class="event-cover-overlay"></div>`
        : '';

      renderPage(`
        <main class="main">
          <div class="page-header">
            <h1 class="page-title">Мои события</h1>
          </div>

          <div class="event-card" onclick="location.href='/editor.html?id=${event.id}'">
            <div class="event-cover ${event.coverImageUrl ? 'has-image' : ''}">
              ${coverHtml}
              <span class="event-cover-text">${event.title}</span>
              <span class="event-badge badge badge-published">Опубликовано</span>
            </div>
            <div class="event-body">
              <h2 class="event-title">${event.title}</h2>
              <p class="event-meta">
                ${event.person1 || event.person2 ? `${event.person1 || ''} ${event.person2 ? '& ' + event.person2 : ''}` : ''}
                ${event.eventDate ? ' • ' + formatDate(event.eventDate) : ''}
              </p>
            </div>
          </div>

          <!-- Link -->
          <div class="link-card mt-4" onclick="copyLink('${event.slug}')">
            <div class="link-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
              </svg>
            </div>
            <div class="link-text">
              <p class="link-label">Ваша ссылка</p>
              <p class="link-url">${location.origin}/e/${event.slug}</p>
            </div>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color: var(--color-text-muted)">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </div>

          <!-- Stats -->
          <div class="stats-row">
            <div class="stat-item">
              <p class="stat-value">${stats.total}</p>
              <p class="stat-label">Ответов</p>
            </div>
            <div class="stat-item">
              <p class="stat-value" style="color: var(--color-success)">${stats.attending}</p>
              <p class="stat-label">Придут</p>
            </div>
            <div class="stat-item">
              <p class="stat-value">${stats.declined}</p>
              <p class="stat-label">Не придут</p>
            </div>
          </div>

          <!-- Actions -->
          <div class="events-grid mt-4">
            <a href="/editor.html?id=${event.id}" class="btn btn-secondary btn-full">
              Редактировать
            </a>
            <a href="/guests.html" class="btn btn-secondary btn-full">
              Список гостей
            </a>
            <button class="btn btn-ghost btn-full" onclick="copyLink('${event.slug}')">
              Поделиться ссылкой
            </button>
          </div>
        </main>
      `);
    }

    async function renderEventList(events) {
      const cards = events.map(e => {
        const coverHtml = e.coverImageUrl
          ? `<img src="${e.coverImageUrl}" alt=""/><div class="event-cover-overlay"></div>`
          : '';

        const badgeClass = e.status === 'PUBLISHED' ? 'badge-published' : 'badge-draft';
        const badgeText = e.status === 'PUBLISHED' ? 'Опубликовано' : 'Черновик';

        return `
          <div class="event-card" onclick="location.href='/?focus=${e.id}'">
            <div class="event-cover ${e.coverImageUrl ? 'has-image' : ''}">
              ${coverHtml}
              <span class="event-cover-text">${e.title}</span>
              <span class="event-badge badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="event-body">
              <h2 class="event-title">${e.title}</h2>
              <p class="event-meta">
                ${e.person1 || e.person2 ? `${e.person1 || ''} ${e.person2 ? '& ' + e.person2 : ''}` : ''}
                ${e.eventDate ? ' • ' + formatDate(e.eventDate) : ''}
              </p>
            </div>
          </div>
        `;
      }).join('');

      renderPage(`
        <main class="main">
          <div class="page-header">
            <h1 class="page-title">Мои события</h1>
            <button class="btn btn-gold btn-sm" onclick="location.href='/templates.html'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 4v16m8-8H4"/>
              </svg>
              Создать
            </button>
          </div>
          <div class="events-grid">${cards}</div>
        </main>
      `);
    }

    async function renderError() {
      renderPage(`
        <main class="main">
          <div class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 8v4m0 4h.01"/>
            </svg>
            <h2 class="empty-title">Не удалось загрузить</h2>
            <p class="empty-text">Проверьте подключение и попробуйте снова</p>
            <button class="btn btn-secondary" onclick="init()">
              Попробовать снова
            </button>
          </div>
        </main>
      `);
    }

    // ─── Profile Sheet ───────────────────────────────────────
    function openProfileSheet() {
      const phone = localStorage.getItem('tl_phone') || '';

      const container = document.getElementById('auth-container');
      const backdrop = document.createElement('div');
      backdrop.className = 'sheet-backdrop';
      container.appendChild(backdrop);

      const sheet = document.createElement('div');
      sheet.className = 'sheet';
      sheet.innerHTML = `
        <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
        <div class="profile-sheet-content">
          <div class="profile-header">
            <div class="profile-avatar">${(phone[1] || '?').toUpperCase()}</div>
            <div class="profile-info">
              <p class="profile-name">Мой профиль</p>
              <p class="profile-phone">${phone}</p>
            </div>
          </div>
          <button class="btn btn-secondary btn-full" onclick="logout()">
            Выйти
          </button>
        </div>
      `;
      container.appendChild(sheet);

      const close = () => {
        sheet.classList.remove('visible');
        backdrop.classList.remove('visible');
        setTimeout(() => {
          backdrop.remove();
          sheet.remove();
        }, 300);
      };

      backdrop.addEventListener('click', close);

      requestAnimationFrame(() => {
        backdrop.classList.add('visible');
        sheet.classList.add('visible');
      });
    }

    function logout() {
      localStorage.removeItem('tl_phone');
      location.href = '/landing.html';
    }

    window.deleteEventById = async function(id) {
      if (!confirm('Удалить это приглашение?')) return;
      try {
        await deleteEvent(id);
        showToast('Удалено');
        init();
      } catch {
        showToast('Ошибка при удалении');
      }
    };

    // ─── Init ────────────────────────────────────────────────
    async function init() {
      const phone = await checkAuth();
      if (!phone) return;

      try {
        const events = await fetchEvents();

        if (events.length === 0) {
          await renderEmptyState();
        } else if (events.length === 1) {
          const event = events[0];
          if (event.status === 'DRAFT') {
            await renderSingleDraft(event);
          } else {
            let stats = { total: 0, attending: 0, declined: 0, maybe: 0 };
            try {
              stats = await fetchStats(event.id);
            } catch (_) {}
            await renderSinglePublished(event, stats);
          }
        } else {
          await renderEventList(events);
        }
      } catch (e) {
        console.error(e);
        await renderError();
      }
    }

    init();
  </script>
</body>
</html>
