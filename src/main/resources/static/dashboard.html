<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
    <title>ToiLink — Панель</title>

    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=DM+Sans:ital,opsz,wght@0,9..40,300..500;1,9..40,300..500&display=swap" rel="stylesheet"/>

    <style>
        /* ─── Design Tokens ──────────────────────────────────────── */
        :root {
            --cream:        #F5F0E8;
            --cream-deep:   #EDE6D6;
            --parchment:    #E8DFC8;
            --forest:       #1E3A2A;
            --forest-mid:   #2D5040;
            --forest-light: #3D6B45;
            --gold:         #B8962E;
            --gold-light:   #D4AE52;
            --gold-pale:    #F0E4BC;
            --ink:          #1A1A16;
            --ink-mid:      #3D3D35;
            --ink-muted:    #7A7A6E;
            --ink-faint:    #A8A89C;
            --surface:      #FDFAF4;
            --surface-2:    #F7F2E8;
            --border:       rgba(30,58,42,0.12);
            --border-gold:  rgba(184,150,46,0.25);
            --shadow-card:  0 2px 16px rgba(30,58,42,0.08), 0 1px 3px rgba(30,58,42,0.06);
            --shadow-lift:  0 8px 32px rgba(30,58,42,0.12), 0 2px 8px rgba(30,58,42,0.08);
            --shadow-fab:   0 4px 20px rgba(30,58,42,0.25);

            --font-serif: 'Fraunces', Georgia, serif;
            --font-sans:  'DM Sans', system-ui, sans-serif;

            --radius-sm:  6px;
            --radius-md:  12px;
            --radius-lg:  16px;
            --radius-xl:  22px;
            --radius-full: 999px;

            --header-h: 60px;
            --nav-h:    68px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);

            --dur-fast:   150ms;
            --dur-normal: 220ms;
            --ease-out:   cubic-bezier(0.22, 1, 0.36, 1);

            /* Legacy compat shims */
            --color-bg: var(--cream);
            --color-surface: var(--surface);
            --color-surface-hover: var(--cream-deep);
            --color-text: var(--ink);
            --color-text-secondary: var(--ink-mid);
            --color-text-muted: var(--ink-muted);
            --color-border: var(--border);
            --color-gold: var(--gold);
            --color-success: var(--forest-light);
            --color-success-bg: rgba(61,107,69,0.1);
            --z-sticky: 100;
            --blur-frosted: 16px;
            --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
            --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-16: 64px;
            --text-h2-size: 1.625rem;
            --text-h3-size: 1.125rem;
            --text-small-size: 0.8125rem;
            --text-caption-size: 0.75rem;
            --weight-medium: 500;
            --weight-semibold: 600;
            --header-height: var(--header-h);
            --bottom-nav-height: var(--nav-h);
            --safe-area-bottom: var(--safe-bottom);
            --container-wide: 640px;
            --duration-normal: var(--dur-normal);
        }

        /* ─── Reset ──────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-text-size-adjust: 100%; }
        body {
            background: var(--cream);
            color: var(--ink);
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100dvh;
        }
        button { border: none; background: none; cursor: pointer; font: inherit; color: inherit; }
        a { text-decoration: none; color: inherit; }
        img { display: block; max-width: 100%; }

        /* ─── Page Shell ─────────────────────────────────────────── */
        .page {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--cream);
        }

        /* ─── Header ─────────────────────────────────────────────── */
        .header {
            position: sticky;
            top: 0;
            z-index: var(--z-sticky);
            background: rgba(245, 240, 232, 0.88);
            backdrop-filter: blur(var(--blur-frosted));
            -webkit-backdrop-filter: blur(var(--blur-frosted));
            border-bottom: 1px solid var(--border-gold);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: var(--header-h);
            padding: 0 20px;
        }

        .logo {
            font-family: var(--font-serif);
            font-size: 1.375rem;
            font-weight: 500;
            font-style: italic;
            color: var(--forest);
            letter-spacing: -0.01em;
        }

        .logo span {
            color: var(--gold);
            font-style: normal;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ─── Buttons ────────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: var(--font-sans);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.01em;
            border-radius: var(--radius-full);
            padding: 10px 20px;
            transition: all var(--dur-normal) var(--ease-out);
            cursor: pointer;
            border: none;
            white-space: nowrap;
        }

        .btn-gold {
            background: var(--forest);
            color: var(--cream);
        }
        .btn-gold:hover { background: var(--forest-mid); }
        .btn-gold:active { transform: scale(0.97); }

        .btn-secondary {
            background: transparent;
            color: var(--ink-mid);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--cream-deep); border-color: rgba(30,58,42,0.2); }

        .btn-ghost {
            background: transparent;
            color: var(--forest-light);
        }
        .btn-ghost:hover { background: rgba(61,107,69,0.06); }

        .btn-sm { padding: 7px 14px; font-size: 0.8125rem; }
        .btn-full { width: 100%; }

        .btn svg { flex-shrink: 0; }

        /* ─── Main Content ───────────────────────────────────────── */
        .main {
            flex: 1;
            padding: 24px 20px;
            padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 32px);
            max-width: var(--container-wide);
            margin: 0 auto;
            width: 100%;
        }

        /* ─── Page Header ────────────────────────────────────────── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: 1.75rem;
            font-weight: 400;
            font-style: italic;
            color: var(--forest);
            letter-spacing: -0.02em;
        }

        /* ─── Events Grid ────────────────────────────────────────── */
        .events-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ─── Event Card ─────────────────────────────────────────── */
        .event-card {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius-xl);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--dur-normal) var(--ease-out);
            box-shadow: var(--shadow-card);
        }

        .event-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lift);
            border-color: rgba(184,150,46,0.4);
        }

        .event-card:active { transform: scale(0.985); }

        .event-cover {
            height: 120px;
            background: linear-gradient(145deg, var(--forest) 0%, var(--forest-mid) 60%, #1A3522 100%);
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        /* decorative pattern overlay on cover */
        .event-cover::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 20% 50%, rgba(184,150,46,0.15) 0%, transparent 60%),
            radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04) 0%, transparent 50%);
            pointer-events: none;
        }

        .event-cover.has-image { background: none; }
        .event-cover.has-image::before { display: none; }

        .event-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
        }

        .event-cover-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(20,40,25,0.65) 0%, rgba(20,40,25,0.1) 60%, transparent 100%);
        }

        .event-cover-text {
            position: relative;
            z-index: 1;
            font-family: var(--font-serif);
            font-size: 1.125rem;
            font-weight: 400;
            font-style: italic;
            color: rgba(255,255,255,0.95);
            letter-spacing: -0.01em;
            text-shadow: 0 1px 4px rgba(0,0,0,0.25);
            max-width: calc(100% - 80px);
        }

        .event-badge {
            position: relative;
            z-index: 1;
            flex-shrink: 0;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .badge-draft {
            background: rgba(245,240,232,0.18);
            color: rgba(245,240,232,0.85);
            border: 1px solid rgba(245,240,232,0.2);
            backdrop-filter: blur(8px);
        }

        .badge-published {
            background: rgba(184,150,46,0.2);
            color: var(--gold-light);
            border: 1px solid rgba(184,150,46,0.3);
            backdrop-filter: blur(8px);
        }

        .event-body {
            padding: 16px 18px 18px;
        }

        .event-title {
            font-family: var(--font-serif);
            font-size: 1.0625rem;
            font-weight: 500;
            color: var(--forest);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .event-meta {
            font-size: 0.8125rem;
            color: var(--ink-muted);
            margin-bottom: 14px;
        }

        .event-actions {
            display: flex;
            gap: 8px;
        }

        .event-actions .btn { flex: 1; }

        /* ─── Divider ────────────────────────────────────────────── */
        .divider {
            height: 1px;
            background: var(--border-gold);
            margin: 0 -18px;
            margin-bottom: 14px;
        }

        /* ─── Empty State ────────────────────────────────────────── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
            color: var(--parchment);
            opacity: 0.7;
        }

        .empty-ornament {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-style: italic;
            color: var(--parchment);
            line-height: 1;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .empty-title {
            font-family: var(--font-serif);
            font-size: 1.375rem;
            font-weight: 400;
            font-style: italic;
            color: var(--forest);
            margin-bottom: 8px;
        }

        .empty-text {
            font-size: 0.875rem;
            color: var(--ink-muted);
            max-width: 240px;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        /* ─── Stats Row ──────────────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 14px 8px;
            background: var(--surface-2);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-gold);
        }

        .stat-value {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            font-weight: 500;
            color: var(--forest);
            line-height: 1.1;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: 0.6875rem;
            color: var(--ink-faint);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* ─── Link Card ──────────────────────────────────────────── */
        .link-card {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-gold);
            margin-bottom: 16px;
            cursor: pointer;
            transition: all var(--dur-normal) var(--ease-out);
        }

        .link-card:hover { background: var(--cream-deep); }

        .link-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(61,107,69,0.1);
            color: var(--forest-light);
            border-radius: var(--radius-md);
            flex-shrink: 0;
        }

        .link-text { flex: 1; min-width: 0; }

        .link-label {
            font-size: 0.6875rem;
            color: var(--ink-faint);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }

        .link-url {
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--forest);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ─── Bottom Nav ─────────────────────────────────────────── */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: var(--z-sticky);
        }

        .bottom-nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-around;
            height: var(--nav-h);
            padding-bottom: var(--safe-bottom);
            background: rgba(245, 240, 232, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-gold);
        }

        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 6px 12px;
            color: var(--ink-faint);
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: color var(--dur-fast) ease;
            border: none;
            background: none;
            cursor: pointer;
        }

        .bottom-nav-item svg {
            width: 22px;
            height: 22px;
        }

        .bottom-nav-item.active {
            color: var(--forest);
        }

        .bottom-nav-item.active svg {
            color: var(--forest-light);
        }

        /* FAB */
        .bottom-nav-fab {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-full);
            background: var(--forest);
            color: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-fab);
            transition: all var(--dur-normal) var(--ease-out);
            flex-shrink: 0;
            margin-top: -10px;
        }

        .bottom-nav-fab:hover { background: var(--forest-mid); transform: scale(1.06); }
        .bottom-nav-fab:active { transform: scale(0.93); }

        /* ─── Sheet (bottom drawer) ──────────────────────────────── */
        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 22, 0.45);
            z-index: 200;
            opacity: 0;
            transition: opacity 300ms ease;
            backdrop-filter: blur(2px);
        }

        .sheet-backdrop.visible { opacity: 1; }

        .sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 201;
            background: var(--surface);
            border-radius: 24px 24px 0 0;
            border-top: 1px solid var(--border-gold);
            transform: translateY(100%);
            transition: transform 300ms var(--ease-out);
            padding-bottom: max(var(--safe-bottom), 16px);
            box-shadow: 0 -8px 40px rgba(30,58,42,0.12);
        }

        .sheet.visible { transform: translateY(0); }

        .sheet-handle {
            display: flex;
            justify-content: center;
            padding: 12px 0 8px;
        }

        .sheet-handle-bar {
            width: 36px;
            height: 4px;
            background: var(--border);
            border-radius: var(--radius-full);
        }

        /* ─── Profile Sheet ──────────────────────────────────────── */
        .profile-sheet-content {
            padding: 8px 20px 20px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--cream-deep);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-gold);
            margin-bottom: 20px;
        }

        .profile-avatar {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--forest);
            color: var(--cream);
            font-family: var(--font-serif);
            font-size: 1.25rem;
            font-style: italic;
            border-radius: var(--radius-full);
            flex-shrink: 0;
        }

        .profile-info { flex: 1; }

        .profile-name {
            font-weight: 500;
            color: var(--forest);
            margin-bottom: 2px;
        }

        .profile-phone {
            font-size: 0.8125rem;
            color: var(--ink-muted);
        }

        /* ─── Toast ──────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
            left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--forest);
            color: var(--cream);
            padding: 10px 20px;
            border-radius: var(--radius-full);
            font-size: 0.875rem;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 200ms ease, transform 200ms var(--ease-out);
            z-index: 300;
            box-shadow: 0 4px 20px rgba(30,58,42,0.2);
        }

        .toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ─── Skeleton ───────────────────────────────────────────── */
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position:  200% 0; }
        }

        .skeleton-card {
            background: var(--surface);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }

        .skeleton-cover {
            height: 120px;
            background: linear-gradient(90deg, var(--parchment) 25%, var(--cream-deep) 50%, var(--parchment) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
        }

        .skeleton-body { padding: 16px 18px 18px; }

        .skeleton-line {
            height: 14px;
            background: linear-gradient(90deg, var(--parchment) 25%, var(--cream-deep) 50%, var(--parchment) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s infinite;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
        }

        /* ─── mt-4 utility ───────────────────────────────────────── */
        .mt-4 { margin-top: 16px; }

        /* ─── Fade-in on render ──────────────────────────────────── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .main { animation: fadeUp 300ms var(--ease-out) both; }

        .event-card:nth-child(1) { animation: fadeUp 280ms var(--ease-out) 40ms both; }
        .event-card:nth-child(2) { animation: fadeUp 280ms var(--ease-out) 80ms both; }
        .event-card:nth-child(3) { animation: fadeUp 280ms var(--ease-out) 120ms both; }
    </style>
</head>
<body>
<div class="page" id="app">
    <!-- Content loaded dynamically -->
</div>

<div id="auth-container"></div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<template id="bottom-nav-template">
    <nav class="bottom-nav">
        <div class="bottom-nav-inner">
            <a href="/" class="bottom-nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span>Главная</span>
            </a>
            <a href="/guests.html" class="bottom-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                <span>Гости</span>
            </a>
            <button class="bottom-nav-fab" id="create-btn" aria-label="Создать">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 4v16m8-8H4"/>
                </svg>
            </button>
            <a href="/templates.html" class="bottom-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
                <span>Шаблоны</span>
            </a>
            <button class="bottom-nav-item" id="profile-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span>Профиль</span>
            </button>
        </div>
    </nav>
</template>

<script>
    /* ─── Header ─────────────────────────────────────────────── */
    document.getElementById('app').insertAdjacentHTML('beforebegin', `
      <header class="header">
        <div class="header-inner">
          <span class="logo">Toi<span>Link</span></span>
          <div class="header-actions" id="header-actions"></div>
        </div>
      </header>
    `);

    /* ─── Config ─────────────────────────────────────────────── */
    const API_BASE = '';

    /* ─── API ────────────────────────────────────────────────── */
    function api(path, opts = {}) {
        const phone = localStorage.getItem('tl_phone');
        return fetch(API_BASE + path, {
            ...opts,
            headers: {
                'X-User-Phone': phone,
                'Content-Type': 'application/json',
                ...opts.headers
            }
        }).then(r => {
            if (!r.ok) throw new Error(r.status);
            return r.json();
        });
    }

    const fetchEvents = () => api('/api/organizer/events');
    const fetchStats = (id) => api(`/api/organizer/events/${id}/stats`);
    const createEvent = (body) => api('/api/organizer/events', {
        method: 'POST',
        body: JSON.stringify(body)
    });
    const deleteEvent = (id) => fetch(API_BASE + `/api/organizer/events/${id}`, {
        method: 'DELETE',
        headers: { 'X-User-Phone': localStorage.getItem('tl_phone') }
    }).then(r => { if (!r.ok) throw new Error(r.status); });

    /* ─── Utils ──────────────────────────────────────────────── */
    function formatDate(iso) {
        if (!iso) return '';
        return new Date(iso).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 2500);
    }

    function copyLink(slug) {
        const url = `${location.origin}/e/${slug}`;
        navigator.clipboard.writeText(url)
            .then(() => showToast('Ссылка скопирована'))
            .catch(() => { prompt('Скопируйте ссылку:', url); });
    }

    /* ─── Auth Check ─────────────────────────────────────────── */
    async function checkAuth() {
        const phone = localStorage.getItem('tl_phone');
        if (!phone) {
            location.href = '/landing.html';
            return null;
        }
        return phone;
    }

    /* ─── Skeleton ───────────────────────────────────────────── */
    function renderSkeleton() {
        return `
        <div class="skeleton-card">
          <div class="skeleton-cover"></div>
          <div class="skeleton-body">
            <div class="skeleton-line" style="width:65%"></div>
            <div class="skeleton-line" style="width:45%"></div>
          </div>
        </div>
      `;
    }

    /* ─── Bottom Nav ─────────────────────────────────────────── */
    function renderBottomNav() {
        const template = document.getElementById('bottom-nav-template');
        document.body.appendChild(template.content.cloneNode(true));
        document.getElementById('create-btn').addEventListener('click', () => {
            location.href = '/templates.html';
        });
        document.getElementById('profile-btn').addEventListener('click', openProfileSheet);
    }

    function renderPage(content) {
        document.getElementById('app').innerHTML = content;
        renderBottomNav();
    }

    /* ─── Views ──────────────────────────────────────────────── */
    async function renderEmptyState() {
        renderPage(`
        <main class="main">
          <div class="empty-state">
            <div class="empty-ornament">✦</div>
            <h2 class="empty-title">Нет приглашений</h2>
            <p class="empty-text">Создайте своё первое приглашение — это займёт всего 5 минут</p>
            <button class="btn btn-gold" onclick="location.href='/templates.html'">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
              Создать приглашение
            </button>
          </div>
        </main>
      `);
    }

    async function renderSingleDraft(event) {
        const coverHtml = event.coverImageUrl
            ? `<img src="${event.coverImageUrl}" alt=""/><div class="event-cover-overlay"></div>`
            : '';

        renderPage(`
        <main class="main">
          <div class="page-header">
            <h1 class="page-title">Мои события</h1>
          </div>
          <div class="events-grid">
            <div class="event-card" onclick="location.href='/editor.html?id=${event.id}'">
              <div class="event-cover ${event.coverImageUrl ? 'has-image' : ''}">
                ${coverHtml}
                <span class="event-cover-text">${event.title}</span>
                <span class="event-badge badge badge-draft">Черновик</span>
              </div>
              <div class="event-body">
                <h2 class="event-title">${event.title}</h2>
                <p class="event-meta">
                  ${event.person1 || event.person2 ? `${event.person1 || ''} ${event.person2 ? '& ' + event.person2 : ''}` : ''}
                  ${event.eventDate ? ' · ' + formatDate(event.eventDate) : ''}
                </p>
                <div class="divider"></div>
                <div class="event-actions">
                  <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation(); deleteEventById(${event.id})">
                    Удалить
                  </button>
                  <button class="btn btn-gold btn-sm" onclick="event.stopPropagation(); location.href='/editor.html?id=${event.id}'">
                    Редактировать
                  </button>
                </div>
              </div>
            </div>
          </div>
        </main>
      `);
    }

    async function renderSinglePublished(event, stats) {
        const coverHtml = event.coverImageUrl
            ? `<img src="${event.coverImageUrl}" alt=""/><div class="event-cover-overlay"></div>`
            : '';

        renderPage(`
        <main class="main">
          <div class="page-header">
            <h1 class="page-title">Мои события</h1>
          </div>

          <div class="event-card" onclick="location.href='/editor.html?id=${event.id}'">
            <div class="event-cover ${event.coverImageUrl ? 'has-image' : ''}">
              ${coverHtml}
              <span class="event-cover-text">${event.title}</span>
              <span class="event-badge badge badge-published">Опубликовано</span>
            </div>
            <div class="event-body">
              <h2 class="event-title">${event.title}</h2>
              <p class="event-meta">
                ${event.person1 || event.person2 ? `${event.person1 || ''} ${event.person2 ? '& ' + event.person2 : ''}` : ''}
                ${event.eventDate ? ' · ' + formatDate(event.eventDate) : ''}
              </p>
            </div>
          </div>

          <div class="link-card mt-4" onclick="copyLink('${event.slug}')">
            <div class="link-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
              </svg>
            </div>
            <div class="link-text">
              <p class="link-label">Ваша ссылка</p>
              <p class="link-url">${location.origin}/e/${event.slug}</p>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--ink-faint);flex-shrink:0">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
          </div>

          <div class="stats-row">
            <div class="stat-item">
              <p class="stat-value">${stats.total}</p>
              <p class="stat-label">Ответов</p>
            </div>
            <div class="stat-item">
              <p class="stat-value" style="color:var(--forest-light)">${stats.attending}</p>
              <p class="stat-label">Придут</p>
            </div>
            <div class="stat-item">
              <p class="stat-value">${stats.declined}</p>
              <p class="stat-label">Не придут</p>
            </div>
          </div>

          <div class="events-grid mt-4">
            <a href="/editor.html?id=${event.id}" class="btn btn-secondary btn-full">Редактировать</a>
            <a href="/guests.html" class="btn btn-secondary btn-full">Список гостей</a>
            <button class="btn btn-ghost btn-full" onclick="copyLink('${event.slug}')">Поделиться ссылкой</button>
          </div>
        </main>
      `);
    }

    async function renderEventList(events) {
        const cards = events.map(e => {
            const coverHtml = e.coverImageUrl
                ? `<img src="${e.coverImageUrl}" alt=""/><div class="event-cover-overlay"></div>`
                : '';
            const badgeClass = e.status === 'PUBLISHED' ? 'badge-published' : 'badge-draft';
            const badgeText  = e.status === 'PUBLISHED' ? 'Опубликовано' : 'Черновик';
            return `
          <div class="event-card" onclick="location.href='/?focus=${e.id}'">
            <div class="event-cover ${e.coverImageUrl ? 'has-image' : ''}">
              ${coverHtml}
              <span class="event-cover-text">${e.title}</span>
              <span class="event-badge badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="event-body">
              <h2 class="event-title">${e.title}</h2>
              <p class="event-meta">
                ${e.person1 || e.person2 ? `${e.person1 || ''} ${e.person2 ? '& ' + e.person2 : ''}` : ''}
                ${e.eventDate ? ' · ' + formatDate(e.eventDate) : ''}
              </p>
            </div>
          </div>
        `;
        }).join('');

        renderPage(`
        <main class="main">
          <div class="page-header">
            <h1 class="page-title">Мои события</h1>
            <button class="btn btn-gold btn-sm" onclick="location.href='/templates.html'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16m8-8H4"/></svg>
              Создать
            </button>
          </div>
          <div class="events-grid">${cards}</div>
        </main>
      `);
    }

    async function renderError() {
        renderPage(`
        <main class="main">
          <div class="empty-state">
            <div class="empty-ornament">✗</div>
            <h2 class="empty-title">Не удалось загрузить</h2>
            <p class="empty-text">Проверьте подключение и попробуйте снова</p>
            <button class="btn btn-secondary" onclick="init()">Попробовать снова</button>
          </div>
        </main>
      `);
    }

    /* ─── Profile Sheet ──────────────────────────────────────── */
    function openProfileSheet() {
        const phone = localStorage.getItem('tl_phone') || '';
        const container = document.getElementById('auth-container');
        const backdrop = document.createElement('div');
        backdrop.className = 'sheet-backdrop';
        container.appendChild(backdrop);

        const sheet = document.createElement('div');
        sheet.className = 'sheet';
        sheet.innerHTML = `
        <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
        <div class="profile-sheet-content">
          <div class="profile-header">
            <div class="profile-avatar">${(phone[1] || '?').toUpperCase()}</div>
            <div class="profile-info">
              <p class="profile-name">Мой профиль</p>
              <p class="profile-phone">${phone}</p>
            </div>
          </div>
          <button class="btn btn-secondary btn-full" onclick="logout()">Выйти</button>
        </div>
      `;
        container.appendChild(sheet);

        const close = () => {
            sheet.classList.remove('visible');
            backdrop.classList.remove('visible');
            setTimeout(() => { backdrop.remove(); sheet.remove(); }, 300);
        };
        backdrop.addEventListener('click', close);
        requestAnimationFrame(() => {
            backdrop.classList.add('visible');
            sheet.classList.add('visible');
        });
    }

    function logout() {
        localStorage.removeItem('tl_phone');
        location.href = '/landing.html';
    }

    window.deleteEventById = async function(id) {
        if (!confirm('Удалить это приглашение?')) return;
        try {
            await deleteEvent(id);
            showToast('Удалено');
            init();
        } catch {
            showToast('Ошибка при удалении');
        }
    };

    /* ─── Init ───────────────────────────────────────────────── */
    async function init() {
        const phone = await checkAuth();
        if (!phone) return;

        // Show skeleton while loading
        document.getElementById('app').innerHTML = `
        <main class="main">
          <div class="page-header">
            <h1 class="page-title">Мои события</h1>
          </div>
          <div class="events-grid">${renderSkeleton()}</div>
        </main>
      `;

        try {
            const events = await fetchEvents();
            if (events.length === 0) {
                await renderEmptyState();
            } else if (events.length === 1) {
                const event = events[0];
                if (event.status === 'DRAFT') {
                    await renderSingleDraft(event);
                } else {
                    let stats = { total: 0, attending: 0, declined: 0, maybe: 0 };
                    try { stats = await fetchStats(event.id); } catch (_) {}
                    await renderSinglePublished(event, stats);
                }
            } else {
                await renderEventList(events);
            }
        } catch (e) {
            console.error(e);
            await renderError();
        }
    }

    init();
</script>
</body>
</html>
