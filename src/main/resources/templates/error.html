<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ошибка — ToiLink</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100dvh; text-align: center; padding: 24px; }
    .wrap { max-width: 360px; }
    .code { font-size: 72px; font-weight: 700; color: var(--color-muted, #9CA3AF); line-height: 1; margin-bottom: 16px; }
    .title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .desc { color: var(--color-muted, #6B7280); font-size: 15px; margin-bottom: 32px; }
    .btn { display: inline-block; padding: 12px 28px; background: var(--color-ink, #1A1A1A); color: #fff; border-radius: 12px; font-size: 15px; font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code" th:text="${status}">404</div>
    <div class="title" th:text="${status == 404} ? 'Страница не найдена' : 'Что-то пошло не так'">Страница не найдена</div>
    <div class="desc" th:text="${status == 404} ? 'Возможно, ссылка устарела или страница была удалена.' : 'Попробуйте обновить страницу или вернитесь назад.'">Возможно, ссылка устарела или страница была удалена.</div>
    <a href="/" class="btn">На главную</a>
  </div>
</body>
</html>
