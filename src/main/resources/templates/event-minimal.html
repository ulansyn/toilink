<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title th:text="${event.title}">Приглашение</title>
  <meta name="description" th:content="${ogDescription}">

  <!-- Open Graph -->
  <meta property="og:type"        content="website"/>
  <meta property="og:title"       th:content="${event.title}"/>
  <meta property="og:description" th:content="${ogDescription}"/>
  <meta property="og:image"       th:content="${ogImage}"/>
  <meta property="og:url"         th:content="${ogUrl}"/>
  <meta property="og:locale"      content="ru_RU"/>

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image"/>
  <meta name="twitter:title"       th:content="${event.title}"/>
  <meta name="twitter:description" th:content="${ogDescription}"/>
  <meta name="twitter:image"       th:content="${ogImage}"/>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Template CSS -->
  <link rel="stylesheet" th:href="@{/templates/template-2/css/style.css}">
</head>
<body>
<div class="page">

  <!-- HERO -->
  <section class="hero" id="hero">
    <p class="label hero__label" id="heroBadge"></p>
    <h1 class="hero__names">
      <span id="heroName1"></span>
      <span class="hero__amp">&</span>
      <span id="heroName2"></span>
    </h1>
    <p class="hero__date" id="heroDate"></p>
    <p class="hero__subtitle" id="heroSubtitle"></p>
    <a href="#next" class="hero__scroll" aria-label="Листать вниз">
      <div class="hero__scroll-line"></div>
      <div class="hero__scroll-dot"></div>
    </a>
  </section>

  <!-- PHOTO -->
  <div class="photo-block photo-block--full reveal" id="photo-block">
    <img id="mainPhoto" src="" alt="" class="photo-block__img" loading="lazy">
  </div>

  <!-- GREETING -->
  <section class="section reveal" id="greeting">
    <p class="label section__label">Слово</p>
    <h2 class="section__title" id="greetingTitle"></h2>
    <p class="section__text" id="greetingText"></p>
  </section>

  <!-- COUNTDOWN -->
  <section class="countdown reveal" id="countdown">
    <p class="label" style="text-align:center">До события</p>
    <div class="countdown__grid">
      <div class="countdown__item">
        <div class="countdown__number" id="cd-days">0</div>
        <div class="countdown__unit">дней</div>
      </div>
      <div class="countdown__item">
        <div class="countdown__number" id="cd-hours">0</div>
        <div class="countdown__unit">часов</div>
      </div>
      <div class="countdown__item">
        <div class="countdown__number" id="cd-mins">0</div>
        <div class="countdown__unit">минут</div>
      </div>
    </div>
  </section>

  <!-- SCHEDULE -->
  <section class="section reveal" id="schedule">
    <p class="label section__label">Программа</p>
    <div class="schedule__list" id="scheduleList"></div>
  </section>

  <!-- LOCATION -->
  <section class="section reveal" id="location">
    <p class="label section__label">Место</p>
    <p class="location__name" id="locationName"></p>
    <p class="location__address" id="locationAddress"></p>
    <a class="location__btn" id="locationBtn" href="#" target="_blank" rel="noopener noreferrer">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      Открыть на карте
    </a>
  </section>

  <!-- DRESSCODE -->
  <section class="section reveal" id="dresscode">
    <p class="label section__label">Дресс-код</p>
    <p class="dresscode__description" id="dresscodeText"></p>
    <div class="dresscode__palette" id="dresscodePalette"></div>
  </section>

  <!-- RSVP -->
  <section class="section rsvp reveal" id="rsvp">
    <p class="label section__label" style="color:rgba(250,250,248,0.4)">Подтверждение</p>
    <h2 class="section__title" id="rsvpTitle"></h2>
    <p class="rsvp__subtitle" id="rsvpSubtitle"></p>

    <form class="rsvp__form" id="rsvpForm">
      <input class="rsvp__input" type="text" id="rsvpName" placeholder="Ваше имя" required>
      <select class="rsvp__select" id="rsvpAttend">
        <option value="yes">Я приду</option>
        <option value="no">К сожалению, не смогу</option>
      </select>
      <button class="rsvp__btn" type="submit" id="rsvpBtn">Отправить</button>
    </form>

    <div class="rsvp-success" id="rsvpSuccess">
      <div class="rsvp-success__icon">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="rsvp-success__title">Спасибо!</div>
      <p class="rsvp-success__text">Ваш ответ принят</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__names" id="footerNames"></div>
    <div class="footer__date" id="footerDate"></div>
    <div class="footer__brand">ToiLink</div>
  </footer>

</div>

<script th:src="@{/templates/template-2/js/api-bridge.js}"></script>
</body>
</html>
