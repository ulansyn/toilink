spring:
  application:
    name: toilink

  web:
    resources:
      cache:
        period: 3600
        cachecontrol:
          max-age: 3600
          must-revalidate: true

  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:toilink}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jackson:
    deserialization:
      fail-on-unknown-properties: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

app:
  upload-dir: uploads

toilink:
  pricing:
    activation:
      amount: ${TOILINK_ACTIVATION_PRICE:990}
      currency: ${TOILINK_ACTIVATION_CURRENCY:KGS}
      display-currency: ${TOILINK_ACTIVATION_DISPLAY_CURRENCY:сом}

logging:
  level:
    liquibase: INFO
server:
  port: ${PORT:8888}
  forward-headers-strategy: ${FORWARD_HEADERS_STRATEGY:none}
  servlet:
    session:
      cookie:
        name: TOILINK_SESSION
        http-only: true
        same-site: lax
        secure: ${SESSION_COOKIE_SECURE:true}
  compression:
    enabled: true
    mime-types: text/html,text/css,text/javascript,application/javascript,application/json,image/svg+xml,application/xml,text/xml,text/plain
    min-response-size: 1024
  http2:
    enabled: true
